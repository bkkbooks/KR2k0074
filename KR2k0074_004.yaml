body:
  text: 兩河清彚卷四益都薛鳯祚撰運河漕河第四節自淮安府宿遷縣起至鎮江府止清口漕河會黃淮河入淮揚裏河至瓜儀過江職官夫役河道湖閘宿遷縣河道自駱馬湖起至古城桃源縣界止長六十二里駱馬湖十里至縣又四十里至白洋河又十二里至古城桃源縣黃河河道上自宿遷縣古城起下至駱馬營清河界止長七十三里古城四十八里至桃源縣桃源二十五里至駱馬營清河界止桃源縣知縣管河主簿清河縣河道西自桃源界駱馬營起東至運河口二十五里又自運河口起至山陽界李家淺止八里自運河起至文華寺迤東山陽界七里墩止計七里工程甘羅城束水壩文華寺仍奶廟天妃廟清河縣知縣管河主簿新莊閘閘官閘夫三十名淺夫二十五名徭夫八十一名沐陽縣協濟夫三十五名髙堰以下四假不係河道自七里溝石墩起至石工盡止四十五里額夫二百四十名洪澤湖後因工繁每歲估修添募夫二百六十名髙良湖越城周橋閘古溝鎮自周橋閘起至塘梗旴𣅿縣界止二十里奉文依舊填平不許增髙一寸山楊縣外河募夫一千裡河淺夫一百二十名黃河淺夫八十五名髙堰淺夫二百四十名龍王閘閘夫二百三十三名工程裡河兩岸髙堰一帶石工清江越河閘太皇老堤自吳城起至清口止長三千三百三十四丈山陽縣知縣裏河主簿外河主簿髙堰大使河道自清河界季家淺起至寶應界黃浦止長一百一十里山陽縣至寶應縣八里武城閘髙良澗閘周家橋閘以上髙堰大使管轄西北洪澤湖一道龍江口清江口福興閘山陽西四十里清江閘軍餉户部船正户部山陽北三十里移鳯閘板閘抽分户部山陽北十里淮安府山陽縣西關管家湖秀麗所鍾郡之勝地沙河即運河起清河至山陽六十里澗河即菊花溝在山陽運河之下西接運河閘河之水東通射陽湖入海之路西門水關通城河與文閘水繞南門城河龍王閘接城河繞舊城東門外龍江閘入澗河由射陽入海楊家廟窰灣閘旱路西北至髙家堰通泗州旴𣅿以上俱係裡河主簿管轄平河橋山陽南四十里涇河大閘山陽縣四十里東入射陽湖黃浦雙閘山陽南五十里為揚州府寶應界南至寶應三十里汛光湖揚州府寶應縣子嬰溝等淺凡十河道自寶應北黃河界起至寶應南界首鎮止長八十里寶應縣至髙郵州一百二十里自黃浦閘起二十五里至北宏濟閘三十里至瓦佃閘二十里至界首鎮工程黃浦寶應縣知縣管河主簿淺夫一百一十五名白馬湖廣洋湖東岸下河自子嬰雙閘起至臨澤四十里臨澤至興化縣六十里運河東白龍潭寶應縣西一百二十里雲山之上周回五十丈深二丈餘運河西章河寶應南六十里東北入廣洋湖寶應南界界首鎮河道六十里至髙郵州界首南四十里清水潭三閘二閘頭閘至髙郵州界首南四十五里茆塘港支河引髙寶湖入邵伯湖下金家灣入芒稻河入江北自泥旬橋南至七里閘止計七里又至陸漫閘計十三里又至髙郵南金門閘四十里沿堤開設減水閘閘河舊為運鹽河在髙郵下河東抵興化縣西抵運河堤岸俗稱東河東岸自減水閘支河起至興化縣止計一百二十里下河髙郵州王琴等淺凡十二河道至江都縣一百二十里髙郵州知州管河州判淺夫一百三十三名工程清水潭東西南壩一帶石工五里閘車邏閘露斤閘三溝鎮閘裔家閘青石港閘二宿閘以上在邵伯北小壩閘金灣閘雙橋閘沙壩閘以上在江都縣減水閘在外州南三十里張家溝巡檢司州南三十里鋪髙郵南界甓社湖州西三十里常見大珠其光燭天州南六十里邵伯鎮邵伯越河邵伯湖白茅湖以上雷塘接小午塘為槐子河直泄運河宜添減水閘茅塘湖支河西接旴泗諸山之水東通邵伯金家灣下芒稻河南四十至灣頭江都北十五里即茱萸灣東至泰州九十里東通海陵如臯通州海門泰興其支派通於諸場故名鹽河又南十五里至揚州府揚州府江都縣河道至儀真七十五里至瓜州四十里江都縣知縣管河主簿淺夫一百二十名其一縣南十五里至楊子橋二水分流二十里至儀真界石人頭又四十里至儀真江際其一楊子橋東南流又二十五里至儀真縣瓜州攔潮閘江口儀真縣北三十里槐子河自陳公塘接句城塘引水入運河儀真縣知縣管河典史淺夫二十七名麻綿港等淺凡三清江等四閘閘官一員閘夫一百五十四名瓜州江防同知瓜州閘官閘夫一百零五名漕河四節事宜防青口淤澀清口乃黃淮交會之處運道必經之所稍淺阻便非利涉但欲其通利須令全淮之水盡由此出則力能敵黃不為沙壂偶遇黃水先發淮水尚微河沙淤上不免淺阻然黃退淮行深復如故不為害也往往髙堰潰決淮從東行黃亦隨之而清口遂為平陸今髙堰築矣獨慮清河對岸王家口等處淮水過盛從此決出則清河之力微矣故於清河縣南岸築堤一千一百八十丈今又接築張福堤四百四十餘丈以防其決工若緩關係甚大已題奉明旨責差印官專力看守更有一事猶宜稽察清口之上口堰河南鳯泗等處商販船隻最利由此直達每為盜決尤宜防之歲守通濟閘外大壩舊日通濟閘逼近外河河形淺直水勢洶湧不便啓閉而朱家口一帶堤岸尤為難守今移閘於甘羅城旁改河於西南隅而於舊閘內半里許築攔水大壩一道置朱家口於度外似為得策矣但大壩最為喫緊萬一傾圮則新河與舊河之水併㵼入閘勢必不支每歲四月初旬須專委能員撥夫六十餘名量備樁草守之不可忽也嚴禁閘河口啓閉諸閘之設平江伯陳瑄時殊有深意蓋節宣有度則外河之水不得突入運河之水不得盈漕非惟清河一帶板閘堤岸易守而寶應諸湖亦緩此一派急流矣故啓閉之法非嚴不可如啓通濟閘則福清二閘必不可啓啓福興閘則通清二閘必不可啓河水常平船行自易單日放進雙日放出滿漕方放放後即閉時將入伏即於通濟閘外填築一軟壩秋秒方啓其於河道關係非小也寶應縣西四十里有白馬湖其當湖心而東即所謂八淺堤也往歲堤決湖水奔溢建瓴而下舟楫過者少遇西風輒沉溺不可救其決處濶八十餘丈深二丈五尺而水勢湍急莫可名狀雖不惜費寧能與水角力哉屢築無功覆轍可監也乃議從湖心淺處先築西堤一道以捍其外仍於河之南北築壩二道暫令運舟越湖而行堤壩成則八淺正決瀦水不流可捧土而塞之矣是築西堤者正所以塞東決也但東決雖塞西堤必不可棄必須歲加修築仍密植橛柳茭葦之屬使其能當波浪則東堤不守而自固矣此當於冬初寶應縣管河掌印官料理者也寶應縣月河自黃浦至三官廟前長二十里水多旁潰入湖是以流緩沙停新閘一帶淺阻為梗今加築西土堤一道長三千六百三十五丈以束漕水可省挑濬之費須責役看守栽植茭柳加意培護歲修之工不可緩也附山寶等州縣水利天常六合五河虹縣等處山水七十餘澗滙於山陽之洪澤湖清口當其沖若歲遇黃水潰決而南復沖射直下阻其入海之勢而逼之南奔漕河淺狹不能容受遂從淮之髙良澗周橋楊家廟文華寺等處泛濫於寶應之白馬湖入甓社湖即髙郵城西之珠湖也又南則為髙郵之南湖也江都縣之黃子赤岸諸湖以上州縣皆受水地方非泄水地方直至瓜儀入江方為全河尾閭來水無窮去水有限瓜儀閘座口面幾何豈足容淮泗諸湖之水哉前賢熟察形勢一開涇河一開子嬰河皆由射陽湖入海以疏髙寶之上流復於江都縣邵伯鎮之南鑿開漕堤造金灣三閘引水徑入芒稻河東南入江造徹底通江閘三座計六門濶十一丈一疏髙寶之下流法至備也而今皆不能然山陽縣南去百里之內涇河閘分水直入射陽湖歲久失修遇水崩決前奉河憲檄督催修理又被侵占盜種者賄買經承將閘改小假公濟私閘基增髙泄水無多當秋夏水漲又啓不數板開不數日旋築月壩堅閉經年全無實用此當速改造者也寶應縣界首鎮之北子嬰雙閘分水直入射陽湖今修建承行者尅減工料樁短灰少閘底石不齊縫不敢全開放少有滲漏損傷隨即填泥下掃歲歲如此亦僅存閘之名耳此當速改造者也至於射陽湖更有當速濬者數年來居民苦於水患因下流不通紛紛求開海口而海口之在泰州興化鹽城界內者如丁溪場白駒場劉莊場神臺場四口現開原無阻塞至於山陽境內之廟灣海口亦空濶毫無阻礙而水不趨下者考之傳記詢之士人乃知射陽一湖全然淤壂水不東注根原在此為今之計重濬射陽湖真有不可一日再緩者湖在鹽城西一百四十里西接寶應縣界西北接山陽縣界瀠回三百餘里嘉隆以來河乃大淤萬厯七年重濬水患稍息至崇禎四年淮北蘇家嘴柳浦灣新溝建儀口並決黃流灌注三年水退而射陽湖幾化為平陸矣然湖形尚在疏鑿不難今約略大概分為三假其上一假自寶應鹽城界射陽鎮起至安豐鎮止約二十五里自安豐鎮至山陽東作地方止約十六七里自東作至涇口止約五里以上係泥水相雜之工自東作至鹽城界清溝止約二十里係泥沙旱工此處湖面舊三十六丈濶今止存三四丈或七八丈耳宜疏濶如舊自清溝至南馬駱地方約十五六里此處亦宜鑿之使寬則下流通暢由此入山陽之軋東溝由溝入濛瀧喻口由口則入廟灣則入於海矣中一假西一假亦皆有入海之路以上決水入海之路芒稻河閘則天啓六年遂為姦徒占塞蠱惑先年鹽監拆閘改造徑將閘底增髙水雖通行勢甚平緩較之舊閘所泄河水曽不及十分之一二閘存實費考芒稻河閘舊名滚水閘先用丈杆試探漕河應存水若干便足行漕再用丈竿試探運鹽河應存水若干尺便足行鹽然後在於芒稻河造閘基址之上打一水平做造閘底如遇水小則水存留於閘底之下遇水大則水滚出於閘底之上當日之為行漕運鹽計固甚詳也今年歲既久漕河之身頗多淤墊至於鹽河西自灣頭東達如臯兩岸髙沙猶易頺塞前朝歲有挑河銀兩皆從鹽引起派今多年不濬則河底淤髙惟閉水行鹽則民田盡沒以當會集司府州道廳縣與司河衙門公同蹅勘仍用丈竿探水淺深另打水平即以水平為閘底凡閘外攔河土壩盡徹之如是而長河水道斷無不通矣以上決水入江之路二者之外又有入海直徑之路開薑家堰六州縣之水雖以廟灣為尾閭而轉折六百餘里方能入海若直走直泄不勞工作必急開薑家堰為至便此閘在鹽城西北離城二十餘里舊有海口自岡門鎮十八里至燈􅌡橋從天妃廟下新洋港入海原係泄水故道秪因侵種者營私逐年填塞遂至滴水不通致六邑腴田盡沉水底矣開石䃮海口在鹽城之東南內地髙於海數丈宣泄諸水比薑家堰又為直捷該縣惑於風水之説堅築實填令滴水不通六州縣之水全無出路所以數十年受陸泥之害也以上二口皆不甚用力水可入海尤當急講也淮陽七邑水利圖説七邑失名寶應縣南涇河黃浦子嬰三閘其下俱有大河兩旁俱係髙􅜌東水入海遇漕河水發從此直趨射陽湖入海非若髙江地方開閘既不通江又難到海盤旋於民田之間六百餘里為害無窮者比也今子嬰雙閘深濶極為得法涇河黃浦亦宜如子嬰之制立雙閘深濶發水不難直泄矣近來借口通湖水淺查得對閘四堤頗多通湖港口源源而來豈夏淺涸哉金灣閘通湖近江為漕河泄水捷徑原議八閘十六門今止三閘六門閘下新河原濶四十丈今止挑二十餘丈二者皆宜開通如舊芒稻河泄水入江最捷二壩止濶十餘丈又閘髙於河底今宜另修添一閘三門改底下深五尺則湖水奮迅入江白塔河泄水與芒稻河同今改築為壩亦宜另開濶底深如芒稻河運鹽河舊例三