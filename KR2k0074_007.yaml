body:
  text: 兩河清彚卷七益都薛鳯祚撰黃河河議辨惑河神或有問於愚曰河有神乎愚應之曰有問者曰化不可測之謂神河決而東神舍西矣河決而南神舍北矣神之所舍孰能治之愚曰神非他即水之性也水性無分於東西而有分於上下西上而東下則神不欲決而西北上而南下則神不欲決而北間有決者必其流緩而沙墊是過顙在山之類也挽上而歸下挽其所不欲而歸于其所欲乃所以奉神非治神也孟子曰禹之治水水之道也道即神也聰明正直之謂神豈有神而不道者乎故語決為神者愚夫俗子之言慵臣慢吏推委之詞也問者曰彼言天者非與愚曰治亂之機天實司之而天人未嘗不相須也堯之時泛濫於中國天未厭亂故人力未至而水逆行也使禹治之然後人得平土而居之人力至而天心順之也如必以決委之天數既治則曰玄符效靈一切任天之便而人力無所施焉是堯可以無憂禹可以不治也歸天歸神誤事最大故愚不敢不首白之也故道或有問於愚曰宋歐陽文忠公云黃河已棄之故道自古難復而公之見舍復故道之外無有也無乃不可乎愚應之曰修之言未試之言也且但云難復非不可復也愚嘗考之史曰漢元光中河決瓠子注巨野後二十餘年武帝自臨決河沉璧投馬羣臣負薪塞之復禹舊迹而梁楚之地無水災矣夫禹舊迹非故道乎堙淤二十餘載而一塞決即復通之何云故道不可復乎且即以神禹治水言之九河曰疏濟漯曰瀹汝漢曰決淮泗曰排傳者曰疏通也瀹亦疏通之意排決皆去其壅塞也故未嘗有開鑿之説故孟子謂之行所無事而他日告公都子者有曰禹掘地而注之海傳者恐人以掘為疑即解之曰決地以去壅塞也蓋天地開闢之初即有百川四瀆原自朝宗於海髙卑上下脈絡貫通原不假於人力歲久湮淤至堯時泛濫之極禹不過審其髙卑上下之勢去其壅塞湮淤之處以復天地之故道耳故未嘗創掘一河也吾人知識不逮神禹逺甚乃欲舍故道而另鑿一河可乎禹無踰矣即如賈魯治河亦以復故道為主傳記可考也且近來徐邳之間屢塞屢通如以故道為不可復則徐邳久為陸矣藉令欲棄故道而鑿新河無論其無所也即使得便宜之地而鑿之人力能使濶百丈以至三百丈深三四丈以及五六丈如故河乎即使能之將置黃河於何地乎如不可置黃河何擇於新故故則淤新則不淤吾不得而知也盡信書不如無書修言不足信也沙墊或有問於愚曰沙墊底髙之説何如愚應之曰河底甚深沙墊則髙理所有也然以之論於旁決之時則可非所論於河水歸漕之後也蓋旁決則水去沙停其底自髙歸漕則沙隨水刷自難墊底但沙最易停亦易刷即一河之中溜頭趨處則深平緩處則淺此淺彼深總不出我範圍此挽水歸漕之䇿必不可緩而欲挽水者非塞決築隄不可也宋蘇文忠吕梁詩云坐觀入市巷閭井吏民走盡餘王尊歲寒霜重水歸壑但見屋瓦留沙痕則此時黃河之水固嘗入市而河流之沙髙於屋矣自宋迄今墊而疏疏而墊者不知其幾豈可以此而遂欲棄故河哉故沙墊底髙者乃故道難復之根而故道難復者乃别尋他道之根此説最為膏肓之疾治河者宜審之挑濬海口或有問於愚曰河以海為壑自海嘯之後沙塞其口以致上流遲滯必須疏濬或别尋一路另鑿海口之為得也愚應之曰海嘯之説未之前聞但縱有沙塞使兩河之水順軌東下水行沙刷海能逆之不通乎蓋上決而後下壅非下壅而後上決也愚嘗親往海口閲視寬者十四五里最窄者五六百丈茫茫萬頃此身若浮蚤暮兩潮疏濬者何處駐足若欲另鑿一口不知何等人力遂能使之深廣如舊假令鑿之易矣又安保其海之不復嘯嘯之不復塞乎舊則塞新鑿者則不塞非愚之所詳也草灣河或有問於愚曰河由草灣入海何如愚應之曰河由淮城北西橋地方入海此故也嘉靖三十年間河忽衝開草灣而西橋正河遂塞連都御史塞之不得未幾自塞河復歸故道今於萬歷十六年河水仍歸草灣而故河復淤淮城之民恃以安枕矣查得草灣六十里至赤晏廟復歸正河似亦無礙但正河之面三百餘丈草灣濶僅三分之一譬之咽喉狹小吞咽不及則徐邳之水消泄未免遲滯此則可慮耳今欲挽歸正河人力亦可施者而清江浦一帶居民方恃正河之塞為安人情難於重拂而以水勢度之二三年間恐當復歸正河姑俟之可也防河非障河或有問於愚曰賈讓有云土之有川猶人之有口也治土而防其川猶之兒啼而塞其口故禹之治水以導而今治水以障何也無乃止兒啼而塞其口乎愚應之曰昔白圭逆水之性以鄰國為壑是謂之障若順水之性隄以防溢則謂之防防之者乃所以導之也河水盛漲之時無隄則必旁溢旁溢則必泛濫而不循軌豈能以海為壑耶故隄之者欲其不溢而循軌以入於海也譬之嬰兒之口旁潰一癰久之成漏湯液旁出不能下咽聲氣旁泄不能成音久之不治身且稿矣何有於口故河以海為口障旁決而使之歸於海者正所以宣其口也再考之禹貢云九澤既陂四海會同傳曰九州之澤已有陂障而無決潰四海之水無不會同而各有所歸則禹之導水何嘗不以隄哉不知考耳問者曰隄以防水似矣水髙隄髙不將隆隄於天乎愚曰若謂隄之外即水耶隄外為岸岸下為河平時水不及岸隄若贅疣伏秋異常之水始出岸而及隄然或三日或五日或七日或旬日即復落歸於漕愚隄成之後逾十年矣未嘗有分寸之加何須隆之於天也賈讓䇿河或有問於愚曰賈讓有云今行上䇿徙冀州之民當水衝者治隄歲費且萬萬出數年治河之費以業所徙之民且以大漢方制萬里豈其與水爭尺寸之地哉此䇿可施於今否愚應之曰民可徙歲運國儲四百萬石將安適乎問者曰決可行也愚曰崔鎮故事可考也此決最大越三四年而深丈餘者僅去口一二十丈間稍入坡內止深一二尺矣蓋住址陸地非若沙淤可刷散漫無歸之水源無漕渠可容且樹樁基磉在在有之運艘僥幸由此者往往觸敗豈可恃為運道且運艘經行之處雖裏河亦欲築堤以便索挽乃可令之由決乎然則賈讓中䇿所謂據堅地作石堤開水門旱則開東方下門溉兾州水則開西方髙門分河流何如愚曰河流不常與水門每不相值或併水門而淤漫之且所溉之地亦一再歲而髙矣後將何如哉矧旱則河水已淺難於分溉潦固可泄而西方地髙水安可往丘文莊謂古今無出此䇿夫乃身未經歷耳劉中丞問水集中言之甚詳蓋名言也惟宋任伯雨曰河流混濁與沙相半流行既久迤邐淤澱久而決者勢也為今之䇿止宜寬立堤防約攔水勢使不大段湧流耳此即愚近築遙堤之意也故治河者必無一勞永逸之功惟有救偏補弊之策不可有喜新炫竒之智惟當收安常處順之休毋持求全之心苛責於最難之事毋以束濕之見強制乎叵測之流毋厭已試之規遂惑於道聽之説循兩河之故道守先哲之成規便是行所無事舍此他圖即孟子所謂惡其鑿矣開支河或有問於愚曰黃淮原為二瀆今合而為一矣而自崑崙千溪萬𣲖如涇渭沁汴諸河與山東諸泉復合之又何怪其溢也為今之計莫若多穿支河以殺其勢何如愚應之曰黃河最濁以斗計之沙居其六若至伏秋則水居其二矣以二升之水載八升之沙非極汛流必致停滯若水分則勢緩而沙停沙停則河塞河不兩行自古記之支河一開正河必奪故草灣開而西橋故道遂淤崔鎮決而桃清以下遂塞崔家口決而秦溝遂為平陸近事固可鑒也問者曰禹疏九河何如愚曰九河非禹所鑿特疏之耳蓋九河乃黃河必經之地勢不能避故仍疏之而禹仍合之同為逆河入於海其意蓋可想也然則如賈讓所云多穿漕渠使民得以溉田分殺水怒可乎愚曰此法行於上源河清之處或可若蘭州以下水少沙多一灌田中禾為沙壓尚可食乎然則淮清其可分矣愚曰引淮而西其勢必與黃會引淮而東則與決髙堰而病淮揚無異也蓋河水經行之處未有不病民者向有欲自盱眙鑿通天長六合出瓜埠入江者無論中亘山麓必不可開而天長六合之民非我赤子哉且所籍以敵黃而刷清口者全淮也淮水中潰清口必塞運艘將從何處經行弗之思耳疏築濬三法或有問於愚曰治河之法凡三疏築濬是也濬者挑去其沙之謂也疏之不可奚不以濬而惟以築乎愚應之曰河底深者六七丈淺者三四丈濶者一二里隘者一百七八十丈沙飽其中不知其幾千萬斛即以十里計之不知用夫若干萬名為工若干月日所挑之沙不知安頓何處縱使其能挑而盡也隄之不築水復旁溢則沙復停塞可勝挑乎以水刷沙如湯沃雪刷之云難挑之云易何其愚何其拘也問者曰昔人方舟之法不可行乎愚曰湍溜之中舟難維繫而如飴之流遇坎復盈何窮已耶此但可施於閘河而非所論於黃河也黃淮分合或有問於愚曰淮不敵黃故決髙堰避而東也今子復合之無乃非䇿乎愚應之曰禹貢云導淮自桐柏東會于泗沂東入于海按泗沂即山東汶河諸水也歷徐邳至清口而與淮會自宋神宗十年七月黃河大決于澶州北流斷絶河遂南徙合泗沂而與淮會矣自神宗迄今六百餘年淮黃合流無恙乃今遂有避黃之説耶夫淮避黃而東矣而黃亦尋決崔鎮亦豈避淮而北乎蓋髙堰決而後淮水東崔鎮決而後黃水北隄決而水分非水合而隄決也問者曰兹固然矣數年以來兩河分流小潦即溢今復合之溢將奈何愚曰水分則勢緩勢緩則沙停沙停則河飽尺寸之水皆由沙而止見其髙水合則勢猛勢猛則沙刷沙刷則河深尋丈之水皆由河底止見其卑築隄束水以水攻沙水不奔濫於兩旁則必直刷乎河底一定之理必然之勢此合之所以愈于分也慮河再決或有問於愚曰河既隄矣可保不復決乎復決可無患乎愚應之曰縱決亦何害哉蓋河之奪也非以一決即能奪之決而不治正河之流日緩則沙日髙沙日髙則決日多河始奪耳今之治者偶見一決鑿者便欲棄故覔新懦者輒自委之天數議論紛起年復一年幾何而不至奪河哉今有遙隄以障其狂有減水壩以殺其怒必不至如往時多決縱使偶有一決水退復塞還漕循軌可以日計何患哉往事無論矣即如萬歷十五年河南劉獸醫等隄共決十餘處淮安河決范家口天妃壩二處上厪夫宵旰特遣科臣督築築後即成安流此其明徴矣故治河者惟以定議論闢紛更為主河決未足深慮也縷堤遙堤或有問於愚曰隄以遙言何也愚應之曰縷隄即近河濱束水太急怒濤湍溜必至傷隄遙隄離河頗逺或一里餘或二三里伏秋暴漲之時難保水不至隄然出岸之水必淺既逺且淺其勢必緩緩則隄自易保也或曰然則縷可棄乎愚曰誠不能為有無也宿遷而下原無縷隄未嘗為遙病也假令盡削縷隄伏秋黃水出岸淤留岸髙積之數年水雖漲不能出岸矣第已成之業不忍言棄而如雙溝辛安等處縷隄之內頗有居民安土重遷姑行司道官諭民五月移住遙隄九月仍歸故址從否固難強之然至危急之時彼亦不得不以遙堤為家也問者曰縷不去則兩堤相夾中間積潦之水或縷堤決入黃河何處宣泄愚曰水歸漕無難也縱有積潦秋冬之間特開一缺放之旋即填補亦易易耳若有格堤處所積水順堤直下仍歸大河猶不足慮矣築遙堤不同或有問於愚曰遙堤之築是矣而直河至古城一帶何以不築愚應之曰此地俱𨽻宿遷內有落馬侍丘等湖湖外髙岡繯繞乃天然遙堤也黃水暴漲則灌入諸湖黃水消落則諸湖之水隨之而出已經題覆如後不敢贅也問者曰桃清二縣之北亦有諸湖聯絡何以築之愚曰湖與宿同而湖外皆係窪地水從五港灌口出海故崔鎮一決而桃清遂涸此則與宿異耳問者曰止築北岸而南岸自馬厰坡而下何以不築愚曰此處岸外即係淮河勢能敵黃黃水泛濫未免灌入黃落仍歸故渠不能奪河故不築也減水壩或有問於愚曰兩堤並峙重門禦暴又何需於減水壩也與其多費以築減水之壩寧若留決之為愈乎且與支河何異也愚應之曰防之不可不周慮之不可不深異常暴漲之水則任其宣泄少殺河伯之怒則堤可保也決口虛沙水衝則深故掣全河之水以奪河壩面有石水不能汕故止減盈溢之水水落則河身如故也俱建於北岸者欲其從灌口入海也問者曰今四壩何以不泄水也無怪乎議者之欲毁也愚曰初創之時伏秋水泄喧聲若雷日久河深深則可容異常之水何嘗不泄特不常也且所謂減水壩者減其盈溢之水也不溢則已何必減為留之以待異常之水可也慮縷隄束水大急恐有奔潰也逺創遙隄以廣容納又慮遙堤涓滴不泄恐有嚙刷也創建滚水壩以便宣泄崔鎮徐升李太等壩皆因地勢卑下使水易趨原以防異常之漲非以減平漕之水也數年以來束水歸漕河身漸深水不盈壩堤不被衝此正河道之利矣議者欲將三壩折落用心良苦識量未得崔鎮壩石頂去地僅二尺八寸視遙隄低七尺徐升壩石頂去地僅二尺五寸視遙堤低七尺三寸季太壩石頂去地僅二尺視遙堤低八尺三壩臨水河岸離水而各八九尺一丈不等較之三壩各髙三四尺不等是河岸甚髙石壩原低每遇伏秋水髙於岸即從各壩滚出其不得出壩者乃不得出岸者也欲分水勢壩可折矣一帶河岸可盡削耶據鄉民畢九臯馮吉趙倫等欣稱壩外水鄉漸成膏腴逃徙之民近方歸業若欲將壩改折二層是為無壩先年河從此決又可虞矣酌之勢仍舊為便築髙家堰或有問於愚曰髙家堰之築淮揚甚以為便而泗州人苦其停蓄淮水何也愚應之曰此非知水者之言也夫髙堰居淮安之西南隅去郡城四十里而近堰東為山陽縣之西北鄉地稱膏腴堰西為阜陵泥墩范家諸湖西南為洪澤湖淮水自鳯泗來合諸湖之水出清口會黃河經安東縣出雲梯關以達於海此自禹迄今故道然也堰距湖尚存陸地里許而淮水盛發輒及堰秦周以前無考矣史稱漢陳登築堰禦淮至平江伯陳瑄復大葺之淮揚恃以為安者二百餘年歲久剝蝕而私販者利其直達以免關津盤訐往往盜決之至隆慶四年大潰淮湖之水洚洞東注合白馬汜光諸湖決黃浦八淺而出揚髙寶興鹽諸邑匯為巨浸每歲四五月間淮隂畚土塞城門穴竇出入而城中街衢尚可舟也淮既東黃水亦躡其後濁流西泝清口遂堙而決水行地宣泄不及清口之半不免停注上源而鳯陽夀泗間亦成巨浸矣故此堰為兩河關鍵不止為淮河堤防也愚戊寅之夏詢之泗人曰鳯泗之水畜於髙堰未決之前乎抑既決之後也僉曰髙堰決而後畜也清口塞於髙堰未決之前乎抑既決之後也僉曰髙堰決而後塞也愚曰堰決而塞築則必通堰決而畜築則必陸堰成而清口自利清口利而鳯泗水下愚何疑乎遂鋭意董諸臣築之二月決工告竣而清口遂闢七月隄工告成而清深闊如故八月河水大退髙堰外水及堤址者僅一百五十丈餘皆乾地再詢泗州之水盡已歸漕膏腴可耕而泗州人士始謂髙堰之當築矣問者曰然則每歲伏秋泗水何復漲也愚曰淮水發源於河南之桐柏山挾汝泛控潁肥濠等處七十二溪之水至泗州下流龜山橫截河中故至泗則湧譬之咽喉之間湯飲驟下吞吐不及一時扼塞其勢然者且淮漲於泗即黃漲於河南徐邳也每歲伏秋皆然自古及今無異泗州水困黃遏淮矣河南徐邳水困又誰遏之乎蓋兩水發有先後各有消長泗人見牛未見羊耳再查萬歷六年以前黃決崔鎮而北淮決髙堰而東兩河風馬牛不相及矣而泗州之告水災者無歲無之即其時也亦豈有黃遏之乎越城周家壩或有問於愚曰髙堰之築是矣而南有越城並周家橋淮水暴漲從此溢入白馬湖寶應縣湖水遂溢此於髙堰之決何異愚應之曰愚與司道勘議已確籌之熟矣其不同者有三而其必不可築者一夫髙堰地形甚卑至越城稍亢越城迤南則又亢故髙堰決則全淮之水內灌冬春不止若越城周家橋則大漲乃溢水消仍為陸地每歲漲不過兩次每溢不滿再旬其不同一也髙堰逼近淮城淮水東注不免溢盈漕渠圍繞城廓若周家橋之水即入白馬諸湖容受有地而淮城晏然其不同二也淮水從髙堰出則黃河濁流必遡流而上而清口遂淤今周家橋止通漫溢之水而淮流之出清口者如故其不同三也當淮河暴漲之時正欲藉此以殺其勢即黃河之減水壩也若併築之則非惟髙堰之水增溢難守即鳯泗亦不免加漲矣然則即於周家橋疏鑿成河以殺淮河之𫝑何如愚曰漫溢之水不多為時不久故諸湖尚可容受若疏鑿成河則必能奪淮河之大勢而淤塞清口泛溢淮揚之患又不免矣况私鹽商舶由此直達寧不壞鹺政而虧清江板閘之稅耶罪河或有問於愚曰向來河堤之決人皆歸罪於河之猖獗隄不能障有之乎愚應之曰河勢自無不猖獗者譬之狂酋狡賊環城而攻惟在守城者加之意耳往事無論矣即如近歲范家口之堤汕刷者十八管河官置之若棄人以告者輒重笞之能無決乎決後官夫避罪輒委之於河而河之罪不可解矣是豈河之罪哉二洪怪石或有問於愚曰昔年徐呂二洪怪石嶙峋上浮水面湍激之聲如雷舟觸之必敗今皆無聲得非沙掩其上而然乎愚應之曰二洪本體甚髙沙能掩之是無徐州矣徐洪於嘉靖二十年為主事陳穆所鑿吕梁洪於嘉靖二十三年為主事陳洪範所鑿巉巖突屹之石一切削而平之剷而卑之今河中之回瀾亭即洪基也又安望其有聲耶皆有碑志可考不必辨也徐城低下或有問於愚曰徐州城當伏秋水發之時河髙於地以至城中雨水難泄人甚苦之奈何愚應之曰此不特徐州為然也濱河州縣皆有之如鳯陽之泗州河南之虞城等縣皆然至如河南省城則河面髙於地面丈餘矣一城之命懸於護城一隄謹謹修守而已城中積水惟有車戽之法而土人頗不慣此墊土增髙亦是良䇿而填築工費不資官街衙舍尚可努力為之小民未必能辦若欲為長久之計則惟有比照宿遷城事例而士民安土重遷未必樂從查得徐南地勢頗窪開濬一渠縱之由符離集出小河口亦一䇿也或曰黃河舊由新集經蕭縣薊門出小浮橋河水尚未至此今由石城出濁河皆係民間稑地原非河身來源既髙故下流河底亦髙耳曰否否自宋熙寧十年黃河南徙會淮水即髙於地矣故蘇軾守徐時有入市巷閭井屋瓦留沙痕之説且河南來源未之有改而河流之髙於省地者又何故哉此其河勢地形髙卑原自如此亦難強圖訝徐州者若知河南省城形勢或自息啄矣今從開渠之議積水盡泄崇禎末年闖逆決此口閣城全沒安土重遷寧不深可悲哉清江堤岸或有問於愚曰清江浦一線之隄廣者不過三四十丈窄者僅二十餘丈兩河掃汕能無慮乎愚應之曰陳平江開鑿清江浦一帶通河濟運所留堤址原只如此問者曰何以徴之愚曰不觀車盤伍壩乎伍壩去河僅二十餘丈進船水溝每為濁流所淤常事撈濬如更廣也何以能車盤乎河由草灣清江浦淤沙稍逺船遂不能進矣此正陳平江之妙用也又不觀之惠濟祠前之石堤乎乃宣德年間之所築也其廣亦不滿二十丈此古迹也豈亦剝削而然哉且各處遙縷堤面廣不過二丈餘尚欲恃以為固矧於二十丈者乃云不能守乎若每歲掃護之工及磯嘴壩之築則不可少耳賈魯舊河或有問於愚曰開復新集舊河之議何如愚應之曰此全河之利也查得黃河故道自虞城以下蕭縣以上夏邑以北碭山以南由新集歷丁家道口馬牧集韓家道口司家道口牛黃堌趙家圈至蕭縣薊門出小浮橋此賈魯所復故道誠永賴之䇿也後因河南水患頗急另開一道出小河口意欲分殺水勢而不知河不兩行本河漸澀至嘉靖三十七年河遂北徙忽東忽西靡有定向行水之處即係民間住址稑地水不能刷衝不成漕雖一望茫然而深不及丈梁樓溝北陳等處不及二尺今大勢盡趨濁河小浮橋不過十之一二矣夫黃河並合萬餘里間千溪萬𣲖之水漰湃泳永旱激勢若奔馬陡然遇淺形如檻限其性必怒奔潰決裂之禍愚恐不在徐邳而在河南山東耳水從上源決出則運道必至淺阻嘉靖二十年間河決亳州而二洪乾涸往事固可鑒也且濁河漫溢坡水皆由地面徐州以下之渠不能著底衝刷以致河水易盈隄防甚為艱苦尤可慮也愚於萬歷六年具疏請復而河南山東當事之臣頗畏勞費會疏請止夫欲復此河非百萬金不可委非細故然與其葺籬於亡羊之後似不若徹土於未雨之前也姑志之以為後日左劵故道或有問於愚曰故道當循是矣然禹時河由大伾巨鹿入北海今入南海矣豈故道乎愚應之曰河自宋神宗十年大決於澶州合南清河而入於淮南清河者即泗沂之故道黃河經行五百餘年矣謂之非禹故道則可謂之非黃河之故道則不可如必欲復禹故道則歲漕四百萬石將安適乎膠柱而鼓瑟矣睢河或有問於愚曰濬睢河以為通運旁行一道且不殺河流也其説何如愚應之曰考之括地志云睢水首受浚儀縣浪蕩渠水東經取慮縣入泗過沛浚儀取慮二縣皆𨽻河南漕河圖志云宿遷縣小河在本縣東南十里源自開封府黃河來流經歸德州虹縣宿州至睢寧縣東南流六十餘里至小河口以入漕河蓋括地志所載乃黃河入北海之時故止云睢水而不及黃河漕河圖志所載乃黃河南徙之後故直指黃河來流也淮安志云小河在宿遷東南十里以其淺狹故名查得𢎞治六年侍郎白昂曽導水自歸德小壩地方經睢寧至宿遷小河口入漕河此因河決河南之金龍口衝張秋勢甚危急故濬此河以殺水勢耳然不久遂淤蓋河不兩行徐邳之河與小河必無並行者今自徐溪口迤北直至永城縣一帶俱成平陸復之亦頗不難但恐此河一開則徐邳必塞若徐邳不塞則此河必復為平陸且均一濁流也在徐邳大河則淤在新復之小河則不淤恐無是理也况小河口而南至清河縣尚有二百三十餘里假如近歲河決崔鎮桃清為塞不知南來運艘將從何路達睢河也問者曰止濬雙溝永堌湖一帶使艘從九里溝出小浮橋倘徐邳正河淤塞此不通而彼通可無阻也愚曰此河源甚淺狹且湖水常盈濬工難施若正河淤塞黃水盡從此河則泛溢無歸非特牽挽無路而經行於樹樁基磉之間必至觸敗與由決河何異也若正河不塞而此河僅分支流則經由正河可也何必去安就險為哉沁河濟運或有問於愚曰改沁入衛以殺黃河之勢何如愚應之曰黃可殺也衛不可益也移此與彼不可也衛漳暴漲元魏二縣田地每被淹沒民已不堪况可益以沁乎且衛水固濁而沁水尤甚以濁益濁臨德一帶必至湮塞不可也又問水集有引沁至長垣界經張秋出永通閘入運濟旱語亦未知沁之濁也一溝之渠寧能當此濁流乎沁可引黃亦可引矣五塘濟運或有問於愚曰五塘蓄水濟運先年設有堤岸今皆圯矣不可復舉乎愚應之曰豫初至之時亦嘗鋭意求復反復行勘查得小新塘與雷公上下二塘相接西去揚州郡城十餘里水由淮子河入漕河句城塘西去揚郡幾三十里水徑奔儀真由響水閘出江四塘皆𨽻江都縣唐長史李襲譽所築也陳公塘𨽻儀真縣其水亦奔響水閘出江漢廣陵太守陳公所築也句城陳公二塘地形髙阜水俱無源惟藉雨積小新上下雷公二塘受觀音閣後及上方寺後並本地髙田所下之水而局面窄小蓄水無多故漢唐二臣築塘積水以為溉田之計非以資運也今若慮漕渠淺涸借此水以濟之則應任其直下不宜築塘以障其流且冬春運河水淺彼先涸矣若慮湖水漲漫借此塘以障之則諸水皆從揚儀徑奔出江與諸湖了不干涉也堤壩之工或有問於愚曰禹以治河稱神而自夏及商為年不甚久逺而盤庚遂有播遷之患至周定王五年以後則或南或北遷徙不常而爾欲以區區隄壩之工遂為長久之䇿乎且自河南而上秦晉之間何嘗有隄哉任之而已愚應之曰成功不難守成為難使禹之成業世世守之盤庚不必遷也周定王以後河必不南徙也人亡歲久王迹熄而文獻無徴故業毁而意見雜出又何怪乎河之無常也至於秦晉之間則更有説山多土堅水難嚙也地亢而曠運不資也河南為城郭所拘徐邳為運道所藉隄而束之勢不得已也世世守之世世此河也歲久人亡道謀滋起愚不得而知也或問凡九條或問引河之説未之前聞今行之而屢效可謂發前人所未發矣亦有行之而不效者乎應之曰有之凡引河必相其勢之轉灣急流之處始放河頭又必河勢迅激不變殆可以衝刷淤沙引歸新河若勢遷徙不定或自西而忽東或自南而忽北忽自西北而東北忽自西北而東南倘挑濬之時驟值其變遷則河流既緩而沙停河飽故引河亦有成有不成相機應變此又權不可以預設者也或曰中州一帶遇有所患下掃護堤掃個多蟄徐淮一帶遇有河患下掃護堤而掃個無蟄與中州不同何也應之曰河在中州其迅溜最急急則水勢下趨淘刷泥沙逾刷逾深而掃個不固自隨水淌矣河在徐淮其汛溜較平平則水勢上行水不下淘泥沙下掃護堤則掃個有所憑麗自無蟄患矣此徐淮河勢與中州不同而掃個之勢故與中州異也或曰頂衝河患既有內堤重障而必於外堤下掃何也應之曰河汛直射堤根坍刷莫禦此預衝之勢也倘徒恃內限重障而不急防外堤一時外堤坍盡則水入堤內而堤夾束而水勢難容怒濤撞激更難汛擋內堤亦必潰決滔滔之勢必至於大潰而不可收拾矣惟外堤護掃以迎其溜水汛不得衝刷堤根則外堤既免坍刷而內堤始得保固無虞耳或曰掃灣河勢不下掃護堤者何也應之曰掃灣之河汛自外行正溜去堤根尚逺即或水勢漲發溢於堤內盈至三四尺逮一時水消堤岸如故縱有潰決正河不得遽奪則一月之餘可塞遲亦不過兩月三月可塞倘不審河勢下掃護堤則掃不迎溜必隨水淌㵼徒費無益也或曰引河之工宜於中州然每見引河已成後竟報淤何也應之曰挑引之工後有被淤者以善後之計未得也即如河勢自西南而來則引河下唇直當東北其衝洶湧之勢漸分但恐下唇塌刷無約攔水勢之力河流走大河易走引河難走大河溜走引河緩流緩沙停不免淤墊矣若使護掃下唇足以約攔河勢則河之入引也迅迅則刷深而沙不停日漸深廣可以成河故曰引河不易成成河宜善後也或曰徐州以下不宜分流然則中州引河往往得成何也應之曰中州土鬆直從上源倒灣處挑引建瓴之勢日刷日深日衝日濶新河既已分流大河既已淤淺力築截河大壩護掃禦衝新河合流以分之者合之也或曰黃河在河南水急故決至邳宿以下則水緩而亦屢報決何也應之曰黃河湍悍之性建瓴而下其在邳宿桃清與中州無異且合睢水白洋諸湖水全會於淮其流焉得緩但河在中州其勢下趨故急在下水至邳宿其勢平行故急在上急在下所以蟄掃而掃費者多急在上所以衝堤而堤易至于潰此河勢在邳宿與河南但有下趨平行之分而無緩急之異也或曰明季河臣潘季馴河防所記翟壩一帶不宜髙築聽其河漲溢流分殺水勢以保髙堰何如應之曰西南原壩髙亢不宜增築此當年之地勢如是數年以來淮水旁泄舊壩衝刷計濶二十五里淺深一二丈不等自古溝由谷家橋夏家橋黃家壩一路多有衝決或為溝渠或成河路既深且廣非復舊日地勢若復因循不塞則髙寶一帶必至田産人民盡付巨波而且清口無全淮之勢砥柱黃流運道俱成平陸矣然則修築增髙何如曰翟壩一帶係天然減水壩今日之成河雖不可不築也而當年之原壩仍不可不復若照髙堰一帶平髙則束水過緊恐髙堰壅潰滔滔東下勢必淤清口而阻漕艘此壩之修磚石灰砌照髙堰之堤量低一尺有餘使漲水有所溢以還天然之壩基而可矣或曰雲梯關為入海之路其上流幾處當治曰上流無處不當治稍有一處旁溢則水從中泄沙必淤澱河不順軌不能衝刷入海矣清口以上桃宿諸決口修築自不必言其在安東境內則邢家口二鋪口皆雲梯關要道所當急為修築以束河流而疏海口者也桃源機宜桃源七里溝大工關係漕運民生事機重大雅康熙十一年十二月奉總河委勘於工次先上疏塞事宜八欵後又兩上緊要事宜至再至三總為國儲民命深切杞憂幸荷總河虛懷信任邀有成績今並録於後初上疏塞事宜一曰廣備物料決口劇工需料殷繁宜多方積儲庶免臨渴掘井之患查決口尚濶四十餘丈除樁􅐨芟纜等項計工另備外栁束須五十萬蘆葦須三十萬草須六七十萬始克有濟倘所備不如其數工至合尖之時捲掃套壓停工待料前工徒費時去莫追矣急宜廣備以收萬全之功一曰酌用物料辦運栁束千萬艱難若不設法撙節無論工程緩急一槩鋪用將來合口緊工之處需栁反缺誤工匪輕目今決口尚寬除底掃用栁外其餘套掃儘可栁七葦三如掃牛填墊掃眼還可均用葦草待進工至口門僅寬二十餘丈之時不但底掃用栁套掃亦必需栁然後將此所省之栁用之於此庶閉口之工捍禦有賴矣一曰堅固堤掃查新築掃工在外邊掃僅止一層力量單薄不堪捍禦須備掃工裡面創築創堤一道底濶八丈髙先做八尺即外河水勢不免浸透而內創堤保障堤堅掃固較之外加邊掃功必倍之矣一曰善挑濬之宜所挑引河規模狹淺水勢難于建瓴流緩沙停斷斷不免河流不分勢必全河仍衝決工無論合尖甚難即僥幸閉合轉瞬漲發衝激特甚豈得無虞殊切杞憂急將引河之身挑濶一十五丈二尺庶乎河流可以分行而築功乃得保固矣一曰籌河頭之勢河頭係河流進口之處必口門倍加寬濶方能引納河流濶須二十丈長十五丈深一丈二尺始為得勢狹則拒河于口外矣再查河從西北向東南注射須于河頭南岸下截河掃三四個使河流不至旁溢而勢得約束入于新河河勢入漕衝刷有力決口之勢自弱矣一曰挑坑溝以引衝刷河渠既寬深似可通流矣但恐河流平衍衝刷不迅難免沙停水緩之虞必須于渠身內另挑大坑五個濶三丈長三丈深五尺又挑橫溝五道並濶十丈長三丈深五尺一溝一坑相間施工有此層層坑溝則河水入渠自然趺蕩衝激河渠滔滔日深兩岸開刷日濶新河既成則決口必然淤淺得免蟄陷復潰之患矣但坑溝內泥水難挑須分築上埂用戽淘運便于挑掘查挑過渠身寬十二丈深五六尺矣此時增濶三丈以足十五丈之數再挑深六尺以足一丈二尺之數約長不過一百丈此一百丈之工而有全渠之用必照議力行無惜小費斷斷成河決口閉合可保無虞矣一曰慎開導以乘時候引河之開導有時不宜早亦不宜遲必候決口將閉河水陡漲新壩受敵岌岌難保之際即將新河頭立時開放則河勢正在盛溢其就下建瓴自然滔滔莫禦新河可一日而成則築功可一勞永固此乘時施工因勢利導間不容髮者也一曰杜旁㵼以歸正流南壩正當迎溜查掃壩迤南有舊溝一道龍門將閉之時壅水淜漲則河勢直射臨壩舊渠崩潰可虞此處須嚴加鞏固宜加護邉掃厚築堤壩以遏衝激旁潰庶河勢得以全力注于新河堤壩堅牢得免意外之患矣再上緊要事宜昨議引河河頭開濶二十丈河身濶十五丈深一丈二尺於一丈二尺完工外仍掘溝坑數道矣但計此河其長不過百丈耳查東南一帶河身淤成平陸者約長數十餘里今僅以百丈之河頭引約全河節短勢蹙猶慮河頭開放所淤之舊河衝刷不動如之奈何乃或謂舊河淤平尚屬新淤土嫩可以衝刷似矣所虞河頭開放太早則全河之勢仍走決口其勢極順何以言之蓋決口河身深二三四丈不等而新挑引河其深不敵決口一半水性就下豈有棄深而就淺者將引河一開而數十里之平淤端然如故勢所必有倘一淤淺前工盡費而決口新壩之衝激何以抵擋其前車不可鑒乎雅前條議中於開放事宜極言萬不宜早又復切切面陳憲臺業已瞭然全為萬全之計除一百丈急請照雅所議刻日完工外再於百丈外東南一帶接挑二百丈寬三丈深六七尺其二百丈內如前法再掘溝坑十四五個以補接河身衝刷之勢使之長往莫禦及其開放時候仍必采雅所議俟決口不過四五丈河流漲溢之時然後開放引河庶免淤淺之虞若決口未到四五丈萬不可先開反引淤澱也至將開口之際必須先下截河掃三四個約攔水勢亦屬最為緊要皆宜預備又杜旁㵼一欵關係甚重若不及時照議綢繆則決口漸窄全河仍衝南壩萬一所慮旁㵼之舊溝突然衝動不但南壩衝激可慮併取土地方亦成河身矣春月南壩之覆轍昭昭可鑒也此壩宜築髙一丈二尺寬十丈外下邉掃隨蟄隨套庶可免于旁㵼之患耳查北壩之西地勢頗低計長不過十有餘丈宜築一堤底濶七丈髙八尺頂濶二丈五尺以補低窪以防叵測前議大壩之內築創堤一道目今宜專在北壩施工蓋以北壩之內河水不深易于建工若南壩之內回流水深創堤不宜驟舉也又查南壩邉掃不過一層力量單薄急宜再加一層以防衝激此皆萬不可緩者也以上數欵十二月二十日途次再呈三上緊要事宜前詳勘兩壩北壩外護邊掃內築創堤前已陳悉但所築之掃壩急須加髙六七尺壩之北頭專用土築而北壩之近龍門者尤宜加掃但所鋪之掃止宜用葦草捲下其栁梢不宜濫用耳若使目前掃壩未蟄漫不加工及工至合尖之時河勢蕩激掃壩必至蟄陷一時搶築無及則預先綢繆施工不容刻緩再思南壩所築較之北壩漸髙目前可恃惟是河勢衝射南壩較之北壩尤甚綢繆捍禦倍宜周詳壩之南半宜加土築而近龍門合口之處宜加套掃亦如北壩總用葦草捲護上面再加土築可也至於外加沿邊大掃須並峙兩層庶幾壩身鞏固所費物料雖奢然全河迎溜要害緊關不可不萬分加意前議引河頭挑濶二十丈而河身濶深一切事宜業已偹陳矣但河頭開放之機宜尚有未盡者切以臨時開掘河頭口門宜在西北上頭開掘十五丈而臨截河掃四五丈不必開掘何以言之從二十丈之上頭開放則河流入口有倒㵼之勢湍悍衝刷自濶自深可以成河倘從河頭截河掃處輕率錯開則全河直衝截河掃壩所慮旁㵼之舊溝難免衝透將挑成之溝渠反不得全河直㵼之勢矣是開放之機宜不可不審度慎重者也前議河頭東南下截河掃三四個以約攔水勢矣然下掃之法尚未詳悉也今思將開引河數日之前先須掘槽長十四五丈深一丈五尺濶一丈四尺鋪掃髙一丈二尺先將此掃推入槽內打樁六七株又鋪第二掃髙一丈長與底掃同鋪完推入槽內正壓底掃打樁五六株若截河掃下或河勢衝刷掃個蟄陷再急急鋪掃套壓又思截河掃個臨河頭宜向西北不宜向東北何以言之蓋掃頭向西北者迎著河勢使全河入于引河之內衝蕩有力倘掃頭反向東北如人之下唇反垂不得收約攔水勢之功此中機宜萬不可錯也又思兩壩進掃晝夜無停則正月二十間決口不過寬十餘丈耳決口漸窄則河勢必漸射引河河頭並南壩所慮杜旁㵼舊溝河頭兩處河頭河勢皆在衝激則引河頭之截河掃與杜旁㵼之護邊掃俱宜于正月二十前掘槽下掃萬不可遲恐遲則河勢衝射坍塌不止倉猝難以施工致悮大事不可不鰓緦過計預先拮據者也以先前後芻議雅親勘真確切實敷陳非同泛泛揣摹條議者比也但從來有治人無治法所慮在仕員役意見不同閲歷生熟有别或議論互異在憲臺當自有特鑒不為浮説所搖則河工幸甚運道民生幸甚矣康熙十二年正月初八日三上事宜新河寢開宿遷縣北新河以固隄防天下創始之事必權其利害而計其始終若有利而無害或利多而害少不妨舍其舊而新是圖若利少而害多或有害而無利則不如仍舊貫之為愈也國家數百萬漕糧資黃河濟運由清口至宿遷董家口曲折二百里許是以修築兩堤不憚勞費以固堤防其來久矣但年來河勢變遷無常河患頻仍不已幸總河經年勞瘁悉心博訪議於宿遷白馬陵山以東即係駱馬縣東峙丘等湖接連不斷近湖之處舊有河形若于此處開挑新河修築縴道由清河縣涉黃入海不惟漕艘可免風波之險而運道亦無衝決淺阻之虞所以為國計民生慮者至周且至也雅奉委會勘自宿遷縣駱馬湖薑兒庒砂礓嘴馬陵山縣東峙丘等湖至七里溝九里岡倉基湖三義鎮等處以上宿桃清三縣地方通共長二萬三千一百四十餘丈挑河築堤約估計銀六十餘萬兩但此挑河築堤之處南係黃流北臨湖水誠恐變徙無常工程難以預料雅上下荒度反覆籌畫有數端難以輕舉者工大費煩竣事無期目前漕運急需河路難言挑築者一也開河迤帶逼近黃河外堤潰決勢必橫衝運堤漕艘必阻難言挑築者二也山水暴發湖水盈溢北堤被侵狂風巨浪汕刷不免難言挑築者三也相勘地勢南昂北低一有疏防建瓴莫禦新堤莫保運道必傷難言挑築者四也黃河濟運治黃為急則力有所分勢難並舉難言挑築者五也似此創新河恐有難成之悔工大而費繁何如仍舊河力施幫築之工事半而功倍耶竊見桃清上下迤帶如新庒七里溝徐升壩九里堽諸險要有決口雖塞尚宜防護者有舊堤單薄急宜幫築大抵岸低則水漲易溢堤近則水勢易浸堤身卑矮單薄又復浮沙不堅則孤堤易傷年來河患全在于此為今之計惟宜加封固隄保運蓋禦黃全慿堤岸其築之之法隄身欲髙以厚隄基欲離河逺而夯杵欲堅用土宜取直於隄身髙厚始足以攔湍悍之流隄基讓逺始足以容浩瀚之勢而且直土不浮夯杵既實則堅固足資擋禦潘季馴謂治河舍築堤無以者此也故開新河不若固堤防之為愈也此康熙十三年冬月勘明議停之詳兩河清彚卷七
