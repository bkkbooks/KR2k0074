body:
  text: 欽定四庫全書兩河清彚卷二益都薛鳯祚撰運河運河形勢通惠河京師至通州四十里運河又名惠通河通州至浙江三千七百餘里自金元明都燕去江南極逺而百司庶府之繁衛士編民之衆無不仰給於江南始元都水監郭守敬開通惠河明尚書宋禮開惠通河逮我皇清一統寰宇因其舊而加葺治江南之粟至天府者嵗且四百萬石舟無沉阻之慮國有儲蓄之富真千載良法也敢備志焉京師至張家灣資通惠河白河之水張家灣至天津衛資潞河白河桑乾河諸水天津至臨清漕衛交㑹資運河及彰衛之水臨清至泉河口資汶泗之水即泰山萊蕪徂徠諸泉也然汶河由南旺南北分流至濟寧故天旱泉河水每苦不足云至魚臺縣折而南㑹泇河資蛤蚧湖駱馬湖諸湖之水宿遷至淮安資黃河以出淮河淮安至瓜儀則南資天長諸山所瀦高寶諸湖之水西資清口所入淮黃二河之水俱由瓜儀出江故裡河之水淺深亦視湖河之盈縮焉瓜儀至上江湖廣江西廣西諸省及江寧等府則資長江之水京口至丹陽而泉絶則資京口所入江湖之水水之盈涸視湖之大小故裡河每患淺澀云常州則資宜溧諸山之水蘇州至浙江則資苕霅諸溪之水運河總部職官州縣及河另載於州縣之下總督河道部堂兼都御史節制五省駐劄濟寧通惠河分司部差三年一代駐劄通州本司所轄通惠河自昌平州入內府由大通橋至通州又㑹白河至天津衛入運河凡三百六十里通永道兼轄河間府管河通判駐劄楊村北河分司部差三年一代駐劄張秋本司所轄河道北自直𨽻河間府靜海縣稍直口起南至山東兖州府魚臺縣邢莊閘止長一千八百二十里一百八十步整飭天津道兼轄河間府管河通判駐劄東光縣泊頭河道北自稍直口起南至鄭家口止長八百二十九里分巡濟東道兼轄分巡東兖道兼轄東昌府管河通判駐劄本府所屬河道北自直𨽻河間府吳橋縣德州衛降民鋪起南至兖州府陽榖縣界官窰口止長五百六十一里西南至直𨽻元城縣一百八十里兖州府管河通判駐劄張秋鎮所屬河道北自陽榖縣界官窰口起南至東平州南界靳家口止長一百五十五里濟寧道兼轄本道所轄運河泉湖與北河南旺二分司同南旺分司部差三年一代駐劄南旺本司所屬有泉十七州縣除乾枯七泉不能濟運四泉外實在泉四百二十三處泉壩夫四百七十六名又䝉隂縣覔雇夫十六名兖州府運河同知駐劄濟寧所屬河道自東平州靳家口起南至滕縣辛莊交界止長二百七十五里夏鎮分司部差三年一代駐劄夏鎮本司所屬除黃河外運河泇河自山東魚臺縣王家口起為直𨽻蒲縣河道至山東滕縣劉昌莊為山東嶧縣界吳家橋又自吳家橋起至江南邳州界黃莊止共二百零八里江南淮徐道兼轄淮安府徐屬河務同知駐劄徐州江南浦縣泇河自山東魚臺縣王家口經本縣至山東滕縣劉昌莊止長四十八里山東東兖道兼轄兖州府管理泇河通判駐劄戚城山東滕縣泇河起江南沛縣劉昌莊經本縣至嶧縣吳家橋止長五十里自吳家橋起至江南沛縣黃林莊止長一百一十里中河分司部差三年一代駐劄吕梁本司所轄除黃河外運河即泇河自江南邳州黃林莊起至駱馬湖口止長一百九十里江南淮徐道兼轄淮安府南岸徐桃宿屬河務同知駐劄內除黃河外所屬泇河起邳州黃林莊至宿遷縣止長一百二十里淮安府北岸宿清河務同知駐劄宿遷縣除黃河外順濟河上接邳州界石窰灣起下至駱馬湖口止長七十里桃源縣運河自宿遷縣界古城起至清河縣界駱馬營止清河縣運河起宿遷縣駱馬營至運河口止長二十五里又自運河口起至王家營止長三十里又自王家營起至娘子廟止長四十里共長九十五里南河分司部差三年一代駐劄高郵州南河之域北至清口南至瓜州東至海門東北至安東所屬淮安揚州高郵寶應江都儀真及山陽清河泗州盱眙通泰泰興興化如臯海門萬厯五年别設中河郎中始定今制淮揚道兼轄淮安府清河縣清口驛起至揚州府儀真瓜州凡四百五十五里山清河務同知駐劄甘羅城除黃河外運河自清河界季家淺起至寶應界黃浦止計一百一十里東岸由興文閘澗河由射陽湖廟灣計一百八十里涇河下至鹽城縣界五十里兩岸新江至武家墩計三十五里西路自清河縣七里墩起至武墩大壩口計七里又自武家墩石壩口起至高堰石工盡頭止計四十五里又自石工盡起至周家橋止計四十里又西至塘梗盱眙縣界止計二十里揚州府管河通判駐劄揚州運河所屬江寶高儀四州縣北自黃浦起南至瓜州止計三百二十五里揚州府江防同知駐劄瓜州三岔河總路徴收河餉江南蘇松常鎮督道各府水利通判浙江督糧道運河第一節通惠河自京師達通州元世祖至元二十九年開通惠河以郭守敬領督水監事逾年工畢自是免都民陸運之勞公私便之帝自上都還過積水潭見舳艫蔽水大悅賜名惠通州縣職官河閘通惠河分司所轄自昌平州至天津衛入運河凡三百六十里通永道兼轄順天府昌平州通州左衛上馬頭淺凡二高家灣淺凡十右衛季兒等淺凡四河通惠河原出昌平州神仙泉㑹馬眼諸泉經都城入內府南出御河橋東行由大通橋至通州與白河㑹總名潞河白河出順天府密雲縣霧靈山南流至都城北㑹沙河榆河至張家灣通惠河㑹桑乾河至天津同運河入海閘大通橋閘慶豐上閘慶豐下閘平津上閘平津中閘平津下閘普濟閘永通閘運河第二節起通州歷天津衛至景州入山東德州至臨清州漕衛交㑹元世祖至元二十六年夀張縣尹韓仲暉等言開河以通運起項城縣安山渠西南由壽張西北至東昌又西北至臨清引汶水以達運河長二百五十餘里中建閘三十有一以時蓄泄河成賜名惠通洪武二十四年河決原武漫過安山湖而運河遂淤永樂初濟寧同知潘叔正因州夫遞運之難請開惠通河命尚書宋禮發丁夫十餘萬疏鑿以復故道又用老人白英所言開袁家口以下二十里達南旺湖又命侍郎金純自金龍口開黃河故道分水下達魚臺縣以益漕河十三年乃罷海運州縣職官河道夫役通惠河分司所轄河道自昌平州入內府由大通橋至通州㑹白河至天津衛入運河凡三百八十里通永道兼轄直𨽻順天府通州知州管河州同河道自葦子厰起至白阜圈止共十六淺長七十六里淺夫一百零二名僉派民夫二百五十二名寶坻縣協濟夫一百名河間府管河通判駐劄楊村香河縣知縣管河典史所屬蔣家灣淺凡六河道自李家淺起至謝家淺止共七淺長二十二里淺夫一百名武陟縣知縣管河主簿所屬三里屯淺凡四泳永旱溝等淺凡十一河道自野雞淺起至丁字沽淺止共十九淺長一百一十七里淺夫二百二十八名香河縣協濟夫五十五名永清縣協濟夫三十三名寶坻縣協濟夫三十名東安縣協濟夫一百三十二名東岸舊有武城總委一員今裁以楊村管河㕔帶管無夫役每動河銀召募天津衛北河分司駐劄山東兖州府張秋鎮本司所轄河道北自河間府靜海縣稍直口起南至山東兖州府魚臺縣邢家莊閘止長一千八百二十里一百八十步整飭天津道兼轄河間府靜海縣知縣管河主簿所屬釣臺等淺凡九河道北自稍直口起南至釣臺淺止長一百四十里淺夫六十名順天府霸州知州管河主簿所屬蘇家等淺一河道北自蘇家口起南至馮家口止長三里淺夫六名天津衛管河千總所屬蔡家口等淺凡十二河道北自潑漲淺起南至蔡家淺止長六十里淺夫一百名河間府青縣知縣管河主簿所屬磚河口驛等淺凡六河道北自新莊淺起南至磚河淺凡長一百六十里又歸併興濟縣所屬安都寨等淺凡七河道北自八里堂起南至官堵寨止長五十里共長二百二十七里天津左衛管河千總所屬留佛住等淺凡二十四河道北自張家口淺起南至流佛寺淺止長七十里淺夫一百名滄州知州管河判官所屬磚河南口等淺凡五河道北自朱家墳淺起南至磚河淺止長四十里淺夫六十名天津右衛管河千總所屬楊家口等淺凡十河道北自馮家口淺起南至楊家淺止長二十里淺夫五十名南皮縣知縣管河主簿所屬徐家堰淺凡五河道北自馮家口起至北下口淺止長五十里淺夫四十名交河縣知縣管河主簿所屬李家灣等淺凡五河道北自白洋橋淺起南至楊家圈止長七十里淺夫四十五名河間衛管河千總河道五里淺夫十名瀋陽衛管河千總河道一里淺夫一名河間府管河通判駐劄東光縣泊頭鎮河道北自稍直口起南至鄭家口止長八百二十九里東光縣知縣管河主簿所屬狼十一口等淺凡七河道北自十二里口起南至連窩止長六十里淺夫八十一名吳橋縣知縣管河典史所屬白草窪口等淺凡十河自連窩淺起南至白草窪淺止長六十里淺夫九十名景州知州管河州判所屬羅家口等淺凡四河道北自狼家口起南至羅家口淺止長二十四里淺夫三十五名故城縣知縣管河典史所屬鄭家口等淺凡三河道北自孟家灣起南至鄭家口止長六十里攙錯山東德州境內淺夫三十名查此外無河道接管處至德州衛西岸才是南境北河分司分巡濟東道兼轄分巡東兖道兼轄山東東昌府管河通判所屬河道北自直𨽻河間府吳橋縣界德州衛降民鋪起南至兖州府陽榖縣聊城官窰口止長五百六十里西南至元城縣界一百八十里山東德州衛管河千總所屬張家等淺凡八河道北自吳橋界降民鋪起南至德州劉官屯止長七十里軍夫一百名德州左衛管河千總所屬鄭家口等淺凡十河道二里在德州境內軍夫二十名德州知州管河判官所屬上下十八里等淺凡六河道自本衛八里堂起至西岸故城縣東岸恩縣新窖止長四十五里淺夫六十名恩縣知縣管河主簿所屬白馬廟等淺凡五河道北自德州界曹家口起南至西岸故城縣界東岸武城縣白馬廟止長七十里淺鋪夫五十三名武城縣知縣管河縣丞所屬桑園口等淺凡二十六河道北自恩縣界方遷鋪起南至東岸夏津縣界西岸清河縣桑園鋪止長一百五十里淺鋪夫一百四十六名夏津縣知縣管河主簿所屬趙貨郎口等淺凡八河道北自武城界橫河鋪起至東岸臨清州皮家圈上與清河縣對岸長四十里淺鋪夫五十一名清河縣知縣管河典史所屬二竒營等淺凡八河道上自武城界賈家口起下至臨清界二竒營止與夏津對岸長四十里淺夫四十七名館陶縣管河主簿河道上自臨清界尖塜起下至大明府亢城界遷民鋪止長一百二十里淺鋪夫六十一名臨清州漕衛交㑹運河自通州至山東臨清州所經海河閘湖海丁字沽直沽海口河桑乾河出自桑乾山又名渾河經蘆溝橋分為二一至張家灣㑹運河一至丁字沽㑹運河入海琉璃橋河出西山㑹通惠河同運河入海雄河自安州經雄縣南合易水達直沽保安州境曹河徐河石橋河一畝泉河滋河沙河雅兒河廣河諸泉皆至安州合流為易水即琉璃橋河滹沱河出大鐵山自代郡鹵城縣東流經獻縣城南十一里單家橋至清縣南岔河口同運河入海潞河至通州而與運河合勢並南流楊村以北通㑹之勢峻若建瓴白河之流壅沙易阻夏秋水漲則懼其潦冬春水涸則虞其澀浮沙之地既難建閘以備宣泄惟有疏濬之功殊為喫緊萬厯十五年初設管河通判專駐楊村其為修防計得矣但查沿河兩堤如搬繒口火燒屯通濟厰東耍兒渡口王家樓華家口閻家口綿花市猪市口觀音堂蔡家口桃花口以上堤岸坍塌卑薄最為險要水發即決近河州縣淹沒為患漕艘飄蕩人甚危之管河官宜每嵗冬間辦積樁草春初水發將前堤加幫髙厚真土實料不得以雜沙塞責糧運將至設法疏濬或築束水小壩使衝刷深廣俾漕船無膠滯之虞民業免沮洳之害司河者宜殫心焉衛河源出河南衛輝府輝縣朔刀泉即百泉也經衛輝府新鄉等處合淇彰二水逾館陶至臨清入漕河漳河出彰德府至衛輝府入漕河板閘之下全賴衛水濟運夏秋之交糧運盛行每患淺澀蓋因輝縣源頭定有仁義禮智信五閘壅泉溉灌民田以致水不下流殊妨國計分巡東昌管河道每嵗糧運北行當呈報總河衙門移文河南管河道速將五閘封閉俾水盡歸運河濟運其餘月分或水勢充盈仍聽便庶公私兩不相妨而運艘不滯矣漕河衛河交㑹之處衛濁而盛漕清而弱當伏秋衛河泛漲浸入漕河恆致淤淺故設三年大挑之法後設板閘如衛漲之時即將板閘下板如遇貢鮮船隻令磚閘與板閘更畨啓閉乃嚴禁不許通漕啓放則衛流倒灌者少大挑亦自省力先期挑濬月河南旺舊例兩年一大挑築壩斷流不通舟楫今開月河官民稱便欲挑正河先挑月河一時兩役並興夫多苦纍時迫則工必略工略則河必淤自今定本年挑正河為大挑次年挑月河為小挑以後著為定規庶舟楫往返既不阻於遲緩夫役用工亦不病於煩難矣築土壩以利接濟閘河地亢衛河地窪臨清板閘口正閘與衛兩河交㑹之處每嵗三四月間雨少泉澀閘河既減衛河又消高下陡峻勢若建瓴每一啓閘放船無幾水即盡耗舟多阻滯宜於閘百丈之外用樁草設築土壩一座水流金門安置活板如閘制然將啓板先閉活閘則外有所障水勢稍緩而千運艘出口易於打放衛水大發即行拆卸嵗一行之費無幾何亦權宜之要術也兩河清彚卷二
