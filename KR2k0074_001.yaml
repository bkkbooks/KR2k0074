body:
  text: 兩河清彚卷一益都薛鳯祚撰運河運河修守事宜通惠河分司所轄渾河東流至張家灣入白河俱係流沙淤淺遇夏秋水漲督率沿河州縣官夫役兩岸晝夜巡邏運河兩岸工程遇有衝決該地方官估計由河廳送司呈送總河大者題請錢糧舉修工小者動支本衙門河庫銀兩鳩築凡淺原設各衛軍夫今俱裁有淺動本司嵗修銀兩覔夫有淺則挑無則止工部給發巡環按季填報年終申總河咨銷北河分司所轄閘河例有大挑小挑之役每至嵗杪回空過盡築壩絶流正月初旬動工二月中旬報完今改定二月初一日開堤南旺臨清河道例應間年一大挑南旺分司所轄泉源每於大挑小挑之後巡勘諸泉使其通流直達汶泗諸河入漕濟運南旺安山二湖每遇山水漲發開通各口斗門一以殺水勢保全運堤一以撒泥沙免澱河腹蜀山馬蹅二湖每遇大小挑之時將汶河築壩絶流使水分入兩湖督夫挑濬仍開汶河南北通流又將月河口堵塞遇天旱水微南北相機開放接濟運舟馬厰湖遇天旱水微開通安居等水門相機節宣獨山昭陽二湖相機節宣以上諸湖或蓄水或殺水俱督廳印河官嚴防以濟運道夏鎮分司所轄嶧縣中有彭口朱姬莊要害每小挑當年大挑間年邳州泇河八閘更有大泛口等處要害其內高亢之處砂礓淤泥疏鑿不易額例一年小挑三年大挑河道內有東邵壩攔前水入豸裡溝其南又有豸裡溝提攔薛水入張莊湖王家口堤攔薛水由東滄橋入赤山湖薛河口石壩攔出口浮沙泇河水口左有微山湖相連赤山湖吕孟湖張莊湖右昭陽各湖二百餘里蓄水濟運於彭口十字河置有三洞閘欲河水內盈放水射沙入湖韓莊閘有湖口壩河水內涸啓板放水入河濟運河道每年小挑間年大挑小挑則泇河百里大挑則滕嶧沛通長二百餘里額夫不足幫以覔夫每嵗終則修過工程報銷中河分司邳州泇河原借山水濟運每嵗溜沙淤墊有黃道人橋等淺春正閉水口覔夫挑濬計土方給銀二月初一日開壩行運宿遷縣駱馬湖口清黃交會運道咽喉新開挑新河外口建築草壩務相時啓閉以便運行黃河每嵗估修之例每嵗冬末春初沿河廳印河官公同沿堤查勘除河流安瀾離逺者不議外如河勢頂沖臨河堤防不能與水敵者應行議掃以俟伏秋水發相機堵禦再視河如日侵刷其堤低薄朽壞者當估另幫萬一河勢頂沖危險即前堤修築又不足恃查後有舊堤一並估修如無舊堤議築新堤務保無虞至於河勢灣曲淘刷無所底止除修築堤掃外仍於堤岸相河頭上流議挑新河分引水勢全河之水盡入新河可保無虞查估用掃料除堡夫課程及夫採葦芟欖橛石不計錢糧外如用不敷始估動用河銀呈請題估工竣核算報銷堤夫防守課程之例每堤夫二名在堤修蓋堡房春月在堤兩旁栽植栁株夏秋水發晝夜在堤防守修補探報水汛漲落冬月辦納課程每嵗栽栁一百株芟三十套欖三十條麻十斤交納貯厰備河上用黃運兩河額設夫議黃運兩河各有額設夫役以供修浚而各夫工食每嵗每名或十二兩或十兩八錢或七兩二錢或五六兩不等其坐支於河庫者詳明批給其額派於條鞭者有司道給發而類報者有州縣徴完而徑給者各不等例不載於奏繳册內查裁停一項因河道變遷夫役不用係在故明時河臣即已裁革占役一項係各衙門人役坐占夫食自前河臣到任後裁革者也曠工一項是未役逃曠夫食並各月小盡逐年扣出者也其裁停銀兩原有定數曠工銀兩實夫多則曠工銀少實夫少則曠工銀多須按工查核每年有此項而無定額占役銀兩自順治三年題準四年為始工食一一還夫夫役名名著工四年以後則無此項矣止將裁停曠工二項每年另造一册隨嵗報奏繳經前河臣楊方興題明兩河事宜因地因時紛雜細碎難以枚舉今略明一二餘俱詳載於州縣及河湖閘本縣之下及本節事宜之內兩河清彚卷一
