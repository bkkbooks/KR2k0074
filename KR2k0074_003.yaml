body:
  text: 兩河清彚卷三益都薛鳯祚撰運河漕河第三節自山東東昌府臨清州起至江南淮安府宿遷縣止分四段一段臨清州漕河㑹衛河一段濟寧州漕河㑹泉河一段江南邳州漕河㑹泇河一段宿遷縣漕河㑹黃河州縣職官河道夫役臨清州知州管河州判所屬潘家橋等淺凡十一河道東岸自夏津縣西岸清河縣界下杖鋪起南至清平縣界潘家橋止長四十里衛河西南至館陶縣尖鋪止長六十里淺鋪橋溜夫一百六十六名新開上閘兼管南板閘閘官淺夫七十七名清平縣知縣管河主簿所屬魏家灣等淺凡九河道北自臨清界潘家橋起南至博平縣界魏家灣止長三十九里淺鋪夫九十四名戴家灣閘閘官閘夫三十九名德州左衛千總拈分南河一道坐清平縣境內博平縣知縣管河典史所屬梭堤等淺凡六河道北自清平縣朱家鋪起至聊城縣梭堤鋪止長三十五里與堂邑縣對岸淺夫八十一名堂邑縣知縣管河主簿所屬梁家鄉等淺凡十河道北自清平縣界西岸起南至聊城縣界南梁家鄉鋪止長三十五里與清平縣對岸淺鋪溜夫一百零二名聊城縣知縣管河主簿所屬官窰口等淺凡二十三河道北自堂邑縣吕家灣起南至兖州府陽榖縣官窰口止長六十五里淺鋪溜夫一百九十四名永通閘閘官閘夫二十八名通濟橋閘閘官係周家店閘官兼管閘夫二十八名周家店閘閘官閘夫二十八名平山衛管河千總所屬淺凡五河道三里在聊城境內軍夫十五名陽榖縣知縣管河主簿所屬鋪驛灣等淺凡十一河道自聊城縣南界官窰口起南至東阿縣北界北灣鋪止長六十里淺鋪橋夫一百四十二名七級上下閘閘官閘夫四十七名阿城上下閘閘官閘夫四十六名荆門上下閘閘官閘夫四十七名東阿縣知縣管河主簿夀張縣主簿兼管所屬沙灣等淺凡八河道北自陽榖縣南界北灣鋪起南至夀張縣北界沙堤鋪止長五十里淺鋪夫一百一十七名夀張縣知縣管河主簿所屬戴家閘等淺凡五河道北自東阿縣沙堤鋪起南至東平州戴家廟止長二十里淺鋪閘夫五十八名東平州知州管河主簿所屬靳家等淺凡十二河道北自夀張縣界戴家廟起南至汶上縣北界靳家口止長六十里淺鋪夫一百五十六名戴家廟閘閘官閘夫二十八名安山閘閘官閘夫二十八名靳家閘閘官閘夫二十八名東平所管河千總所屬河道十二里在東平州境內軍夫十四名汶上縣知縣管河主簿所屬界首等淺凡十四河道北自東平州靳家口起南至嘉祥縣孫村界止長五十六里一百八十步淺鋪夫三百零四名袁家口閘閘官閘夫二十六名開河閘閘官閘夫二十六名南旺下閘閘官閘夫一十八名南旺上閘閘官係下閘閘官兼管閘溜夫一十八名寺前鋪閘閘官閘溜夫六十八名嘉祥縣知縣管河主簿河道北自汶上縣孫村界起南至巨野縣長溝界止長十六里淺鋪夫五十七名內有僉巨野夫二十五名例隨巨野河官用工通濟閘閘官閘夫七十五名巨野縣知縣管河主簿河道北自嘉祥縣寺前鋪南至濟寧衛交界止長二十五里淺鋪夫一百八十六名通濟閘閘官閘澀夫七十五名濟寧衛管河千總所屬曹井橋等淺凡五河道北自巨野縣曹井橋起南至濟寧州五里營止長十八里淺鋪軍閘夫一百三十名濟寧州知州管河判官所屬硯瓦溝等淺凡十一河道北自濟寧衛界起南至魚臺縣界止長七十五里淺鋪夫二百四十六名天井閘閘官溜橋閘夫一百零九名在城閘閘官閘溜夫八十一名帶管下新閘閘夫四名趙村閘閘官閘溜夫七十五名石佛閘閘官閘溜夫七十四名新店閘閘官閘溜夫七十四名新閘閘官係仲家淺閘閘官兼管溜夫七十四名仲家淺閘閘官閘溜夫三十六名師家莊閘閘官係仲家淺閘官兼管閘溜夫四十九名魯家閘廢由月河行船閘夫二十五名隨淺夫用工棗林閘閘官閘夫二十四名魚臺縣知縣管河主簿河道北自濟寧州棗林閘起南至滕縣新莊橋界止長八十五里南陽閘閘官閘夫三十二名壩夫四十六名邢莊閘閘官閘夫二十四名溜夫四十七名江南沛縣知縣管河主簿河道北自魚臺縣王家口起南至滕縣界劉昌庒止長五十里朱梅閘閘官閘夫三十名楊莊閘閘官閘夫三十名夏鎮閘閘官閘夫四十名山東滕縣知縣管河主簿河道泇河北自沛縣劉昌起至嶧縣界吳家橋止長五十里壩夫一百四十一名三洞閘無銀無夫嶧縣南五十里新河入泇河嶧縣知縣管河主簿河道泇河上自滕縣界吳家橋起下至江南邳州黃林莊止長一百一十里設八閘減水閘無夫役徭夫二百三十一名韓莊閘閘官閘夫三十名夏鎮閘至韓莊閘九十里德勝閘係韓莊閘閘官兼管閘夫三十名張莊閘閘官閘夫三十名萬年閘係張莊閘閘官兼管閘夫三十名丁廟閘閘官閘夫三十名頓莊閘閘官係丁廟閘閘官兼管閘夫三十名侯遷閘閘官閘夫三十名韓莊閘至臺莊閘八十里臺莊閘閘官係侯遷閘閘官兼管閘夫三十名江南邳州知州管河判官河道泇河上自黃林莊起下至宿遷縣碓灣止長一百二十里有各淺淺夫一百三十七名徭夫二百六十九名臺莊閘至猫兒窩七十里黃道人橋汶河口楊家淺徐塘吳家溝吳江以上各淺宿遷縣知縣管河主簿河道泇河上自確灣起下至駱馬湖止長七十里黃河上自駱馬湖口起下至桃源縣界古城止長六十二里猫兒窩至駱馬湖七十里駱馬湖至宿遷縣十里駱馬湖口清黃交㑹運道咽喉原由董口行運計自康熙七年改由駱馬湖九年開挑新河外口建築草壩相時啓閉以便運行山東臨清州至江南淮安府宿遷縣所經湖河泉閘安山湖萬厯十九年修土堤共長四千三百二十丈又於似蛇溝八里灣建閘二座以便蓄泄可為濟漕永利汶上縣南旺湖萬厯十七年開濬湖中渠道南西北三面舊堤長一萬二千六百丈添南面子堤長七千一百八十八丈又於五里鋪建石壩一座長五丈以便蓄泄濟運汶上縣西房家口係南旺湖之尾閭此口稍卑汶水就西而下每決房家口而傷運河之堤南旺之水則涸矣今築石壩平時任其南逝水漲㵼之西良得䇿也每歲伏秋管河官不時巡視少有圯壞即便修砌馬蹅蜀山二湖在分水口之東其南曰蜀山北曰馬蹅水納汶水為蓄水濟運之湖汶上縣馬蹅湖萬厯十七年修築土堤自宏仁橋起至禹王廟止共長三千三百一十三丈以便存蓄濟運運河南旺湖北蜀山湖萬厯十七年修築舊土堤自馮家壩起至蘇魯橋止共長三千五百八十丈其馮家壩係蜀山湖之門户地卑而易泄故築壩以障之蓄可益運泛不病民蘇魯橋至田家樓原係收水門户栽植豐界髙柳濟寧州馬厰湖在運河之北為蓄水濟運之湖泗河分流之由府河自濟寧城北入湖又有洸河下源之水亦由濟寧城北入湖馬厰湖萬厯十七年修築東面新舊堤共長一千六百二十丈泰安州魚臺縣南陽之南左曰獨山湖右曰昭陽湖獨山為蓄水濟運之湖昭陽為役水保堤之湖獨山湖昭陽湖滕縣各湖堤岸漕艘全借於溝渠而漕渠每資於水匱五湖者水之匱也止因舊堤浸廢界地不明民乘乾旱越界私種盡為禾黍之場先是兵部郎王原建土堤可稱濟漕永利萬厯十六年都給事常㑹督河潘修築堅固斗門閘壩悉已完備當嚴禁射利之徒希圖耕種盜決之弊嚴令管河官周圍巡閲責令守湖人役投遞甘結庶河務飾而水力無滲泄之患矣萬厯三十年開泇河避黃河三百餘里之險資泇河諸湖蚧蟃湖連旺湖睢寧縣北滕縣南柳湖周湖邳州北嶧縣南黃墎湖駱馬湖宿遷縣西北南旺湖在汶上縣西南漕河縱貫其中湖界為二東湖廣衍倍於西湖北接馬蹅武莊波湖以及安山南接馬場坡湖以及昭陽諸湖相屬綿亘數百里徐兖東平汶上諸郡邑環列其左右即古大野澤也大野既資洙泗濟水而成而泗通於淮濟通於汶淮通於沂汶通於洸而泗之上源又自大野而通於濟是大江以北中原諸水縱橫交絡皆與大野相連而當時入貢之道青之浮汶兖之浮濟徐與楊之浮淮泗皆與大野相關大野在古已為運道之要㑹矣各湖水髙於河殆六七尺春夏水涸每借水以濟漕若遇旱各湖原設水車三百六十具即令車水以濟漕河泉河即汶河一出萊蕪原山之隂一出本縣寨子村一出泰山之陽仙臺嶺三水俱名汶至靜封鎮合流至寧陽縣又分為二汶水分流一自東平州戴村壩西南流至汶上縣㑹白馬河鵝河凡八十里南北流號為分龍口入運河三水既合流而又分流其東又一汶河同沂水入淮汶水凡四因時分合汶流南旺分水地形最髙所謂水脊也決諸南則南流決諸北則北流惟吾所用何如耳當春秋糧運勝行之時正汶水微弱之際分流則不足合流則有餘宜效輪番法如運艘淺於濟寧之間則閉南旺北閘令汶盡南流以灌茶城即鎮口閘也如運艘淺於東昌之間則閉南旺南閘令汶盡北流以灌臨清當其南也更發南濱諸湖水佐之當其北也更發濱北諸湖水佐之泉湖兼注南北合流即遇旱暵克有濟矣守戴村壩汶水自陶泰而來就鹽河由博興車瀆入海自宋司空築壩戴村蜒蜿九里屹如天成回狂瀾而逆西入惠通河方得濟運此壩係全河屛障絶汶水入鹽河之路令入惠通河先年設夫增土植柳防護周密歲久防弛以漸卑薄萬一乘瑕復歸故道不無可慮宜令東平州汶上管河官督夫培土植柳悉如舊制此係運河第一喫緊關鍵慎不可忽挑濬汶河淤沙汶河口石壩固為完固但可以泄水而不可以通河日久淤停沙填河飽則能致水漲漫或嘴橫射沙灣則能逼水冲決宜督管河官乘暇集夫挑濬使水不東逼徑直南趨誠為保全石壩要務是在司河者先事而加之意耳汶水分流自寧陽縣堽城壩西南流合泗沂二水凡一百餘里至濟寧州南天井閘入運河坎河口係汶水泄入鹽河之處遏之不能縱之河竭萬厯十七年築滚水石壩一座長六十丈水漲任其外泄水平仍復內蓄濟漕濟水源頭守坎河石壩坎河口與戴村無異蓋戴村既築之後水無歲久復冲此口泉水決入鹽河運河每至淺涸萬厯十六年都給事中常㑹同撫按題請築壩總河潘於十七年又築石壩一道水漲而湖河無泛濫之患水平而漕渠無淺涸之虞利害甚重防守當嚴必每歲六月初旬即令東平州管河官駐劄堤上備料集夫相機捍禦九月初旬始得徹守著為定例永保萬全司河者宜加慎焉洸河自寧陽北西南流循縣西又南至髙要橋㑹寧陽諸泉經濟寧城東與泗水㑹於天井閘入運河泗河出泗水縣東陪尾山四泉並發循西流過卞莊城始合為一西流至兖州府東又轉南流經橫河與曲阜縣沂水合今導之以濟運乃於兖州門外作金口閘遏令東入府城轉而南流㑹洸河入濟寧州天井閘沂河有二源出曲阜縣尼山西南流與泗水合分為二股一西流金口閘入天井閘入運河一㑹泗水下師家閘入運河沙河內改開殺水大支河一道入趙溝等泉㑹獨山湖又於新童紙房口各開支河一道創鑿趕牛溝壩以為障禦距薛河石壩半里皇輔壩遏沙水上流由支河㑹趙溝泉入南陽湖翟家壩收沙水餘流入甄家窪頌家壩收沙水餘流出尹家湖飲馬池歡城壩收沙水餘流入鮎魚泉沙河壩專為防禦沙水薛河即孟嘗君封地薛河石壩距東邵壩五里王家樓壩遏薛水上流由支河至豸裡溝豸裡溝壩遏薛水中流由支河徑入吕孟湖出地濱溝入運河泇河嶧縣南五十里新河俗名中心溝源出茅山後復受泉水下流為彭河又東㑹丞水入泇河舊名泇溝萬厯三十一年總河李化龍上疏言前河臣所開泇河遺迹濬之可避黃河三百餘里之險乃開泇河挑郗山前經接劉同知所開新渠濬舊工八十七里新工八十二