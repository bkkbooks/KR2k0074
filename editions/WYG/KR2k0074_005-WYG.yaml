body:
  text: 兩河清彚卷五益都薛鳯祚撰黄河黄河源漢張騫使西域唐薛元鼎使吐蕃皆求河源得其概畧然其時外國未盡臣服不能直抵其處而究其極也元有天下薄海内外人迹所及皆直驛𫝊驛使往來如行國中至元十七年命都實為招討使佩金虎符往求河源都實受命至河洲之東六十里寧河驛西南六十里有山曰殺馬關林􅅢窮隘舉足浸髙行一日至嶺舉足愈髙四閲月始抵河源是冬還並圖其域𫝊位置以聞其後翰林學士潘昂霄得其説撰為河源誌臨川朱思本又得帝師所藏梵字圖書而以華言譯之二家互有詳畧今取二家之書考定其説吐蕃朶甘思西鄙有泉百餘泓沮洳渙散弗可逼視方濶七八十里履髙山下望燦若列星以故名火敦腦兒譯言星宿海也河源在中州西南直泗川馬湖蠻部之正西三千餘里雲南麗江宣撫司之西北一千五百餘里帝師撒思加地之西南二千餘里群流奔輳近五七里滙二巨澤名阿剌腦兒自西而東連屬吞噬行一日迤邐東騖成川名赤賓河又行二三日水西南來名赤里出入與赤賓河合又三四日水南來名忽䦨河東南來名也里术水與赤賓河合忽䦨河源出自南山其地大山峻嶺綿亘千里水流五百餘里注也里术河也里术河亦出自南山西北流五百餘里入黄河其流浸大始名黄河然水猶淺人可涉又一二日岐為八九股名也終斡倫譯言九渡通廣五七里可渡馬又四五日水渾濁土人抱革囊騎過聚落紏木斡象舟𫝊髦革以濟僅容兩人自是兩山夾束廣濶一里二里半里其深叵測自渾河東北二百餘里與懐裏火秃河合秃河源出西北偏西八百餘里入黄河又東北流一百餘里過麻哈地又正北流一百餘里乃折而西北流二百餘里又折而正北流一百餘里又折而東流過崑崙山下畨名亦耳麻不剌其山崑崙山髙峻非常腹及頂皆雪冬夏不消山麓綿亘五百餘里河隨山足東流河行崑崙南半日又四五日至地名濶及濶提濶及濶提二地相屬與亦西八思今河合思今源出鐡豹嶺北正北流五百餘里入黄河又三日地名哈剌别里赤兒四達之衝也多冦盗有官兵鎮之近北三日河水過之崑崙以西人簡少多出山南山皆不穹峻水益散漫其山東益髙地漸下㟁至狹隘有狐可一躍而過之處行五六日有水西南來名細隣哈剌譯言細黄河自白狗嶺之北流五百餘里入黄河又兩日水南來名乞兒馬出二水合流入河乞兒馬出源出威茂州之西岷山之北水北流即古當州境正北流四百餘里折而西北流又五百餘里入黄河黄河自乞兒馬出河與黄河合之後又西北流與鵬梭河合鵬梭源出鵬梭山西北正北流七百餘里入黄河折而西北流三百餘里又折而東北流過西寧州貴徳州馬嶺凡八百餘里與邈水合邈水源自唐宿軍谷正北流五百餘里過三巴站入黄河歸徳州地名必赤里始有州治官府𨽻吐蕃等處宣慰司州又東北流過土橋站古積石州來羌縣城廓州搆米站界都城凡五百餘里過河州與野龎河合野龎源自西傾山之北東北流五百餘里入黄河河自發源至漢地南北澗溪細流旁貫莫知紀極山皆草石至積石方林木暢盛世言河九曲彼地有三曲又東北流一百餘里過蹅白城銀川站與湟水浩舋河合湟水源自祁連山東北流一千餘里入浩舋河浩舋河源自刪丹州之南删丹州東南流七百餘里入湟水二水合入黄河又東北一百餘里與洮河合洮河源出草撒嶺東北流過臨洮府凡八百餘里入黄河北流過䝉古地八百餘里過豐州西受降城折而正東流過䝉古地古天徳軍中受降城東受降城凡七百餘里折而正南流過大同路雲内州東勝州與黒河合黒河自魚陽嶺之南西流五百餘里入黄河正南流過保徳州葭州及興州境又過臨州凡一千餘里與吃那河合吃那河源自古當州東南流過陜西綏徳凡七百里入黄河又南流三百里與延安河合延安源自陜西蘆子關亂山中南流三百餘里過延安府折而正東流三百里入黄河又南流三百里與汾河合汾河源自河東朔武州之南亂山中西南流過營州冀寧路汾州霍州晉寧路絳州又西流至龍門凡一千二百餘里入黄河又南流二百里過河中府過潼關與渭河合渭河出西傾山東流一千五百里入黄河潼關與太行大山綿亘水勢不可復南乃折而東流河源東北流所歴皆西畨地至䦨州凡四千五百餘里始入中國又東北流過䝉古地凡二千五百餘里始入河東境内又南流至河中一千八百餘里通計九千餘里始東流平地黄河出星宿海行九千餘里至潼關始出大山落平地又東南二千餘里而歸海合一萬二千餘里之間千溪萬𣲖漰湃湍激難可名狀今分南㟁北㟁以别之觀者可易覽云黄河總部職官州縣及河官另載於州縣之下總督河道部堂兼都御史節制五省駐劄濟寧河南分巡通省河道駐劄省城所屬開封歸徳彰徳衛輝懐慶河南南陽汝寧八府汝州一州開封府管南河同知駐劄荆隆口管河南岸滎澤鄭州原武陽武中牟祥符陳留蘭陽儀封九州縣四百八十三里半開封府管北河同知駐劄陳橋鎮管河北㟁武陟縣界起滎澤原武陽武封丘祥符陳留蘭陽儀封八縣至山東曹縣界止共三百一十里歸徳府河捕通判駐劄本府管河南北兩㟁南自儀封堤界起經考城商丘虞城三縣至江南碭山堤界止共一百五十六里北自儀封堤界起經考城芝蔴莊王家道口劉通集至山東曹縣堤界止長三十里山東分巡濟寧道駐劄濟寧所屬黄河上自曹縣界起下經單縣至碭山界管理黄河兖州府總捕同知駐劄曹縣轄曹單二縣管河北㟁西起河南考城界入曹縣經單縣東至江南山陽縣止長二百里中河分司部差三年一代駐劄呂梁所屬黄河自山東單縣起至江南安東縣新開河五港口止淮徐道駐劄徐州轄徐靈邳宿睢桃蕭沛豐碭十州縣淮安府徐屬河務同知駐劄徐州轄豐沛蕭碭徐州分汛南岸自徐州界起至靈璧界止長一百一十里北岸自單縣界起下至徐州七里溝止長二百七十五里淮安府邳宿河務同知駐劄邳州轄靈璧睢寧邳州分汛南岸上自徐州界起歴靈璧睢寧至宿遷界共一百二十九里北岸上自半山寺起下至直河鎮止長六十里其内運泇河上自黄林莊起下至宿遷窑灣止長一百二十里淮安府宿桃管河同知管南㟁轄宿遷桃源縣分汛黄河南岸上自邳州界起下至清河界止歴宿桃二縣共二百零五里淮安府管桃山清北㟁同知駐劄轄宿遷桃源清河山陽分汛北㟁上自直河鎮起下至桃源縣止共一百二十里其内順濟河上接邳州界下至駱馬湖口止共七十里添設淮安府歸仁堤同知駐劄歸仁淮揚道駐劄揚州轄黄河山陽清河安東三縣淮安府山清河務同知駐劄淮安府分汛上自清河縣黄河下至新河周門海口止其運河上自清河縣李家淺起至寳應縣黄浦止共三百一十里添設淮安府清安同知駐劄安東縣添設淮安府髙堰同知駐劄黄河南㟁南㟁過潼關經河南河南府閿鄉縣靈寳縣澗水自南來入河陜州北㟁濟源縣經峽石關三門七津澠池縣河中抵柱北㟁孟縣瀍水南來入河河南府北邙山至孟津縣北㟁懐慶府河内縣舊孟津巡檢司􅅯師縣洛河伊河自南來入河洛水出陜西冡嶺山伊水出陜西熊耳山相合入黄河黒石關至鞏縣北㟁温縣東北池等三水並流入河河北㟁武陟縣河南管河道轄開封府南河同知駐劄本府荆隆口管黄河南㟁滎澤鄭州原武陽武中牟祥符陳留蘭陽儀封九州縣開封府滎澤縣北㟁獲嘉縣滎澤縣知縣管河主簿黄河南㟁防河長堤西自本縣小院村起經梨園村蘓家莊楊家嘴郝村東至鄭州堤界止長一十二里堡房十一座鄉堡夫二十二名南㟁逼近省城最為喫𦂳如滎澤之小院村孫家渡中牟縣之黄煉集祥符縣之瓦子坡槐疙疸劉獸醫口陶家店張家灣時和驛兎伯堽埽頭集陳留縣之王家樓蘭陽縣之趙皮寨儀封縣之李景髙口普家營商丘縣之楊先口俱為要害正統十三年河决張家渡全河從此南徙𢎞治二年河復決累開累塞萬歴十八年増築遥堤一道長五百八十六丈鄭州北㟁西北新鄉縣北河北㟁原武縣北㟁東陽武縣小陳橋判官村黄煉集施家寨鄭州知州管河判官黄河南㟁長堤西自滎澤界起經本州小陳橋東至原武界止長一里半無額設堡夫堡房三坐原武縣縣治在河北職官見北㟁黄河南㟁長堤西自鄭州界起經本縣馬家渡小陳橋判官村東至陽武堤界止長四十里鄉堡夫四十名堡房二十座黄煉集一帶止有單堤一道尤恐不支萬歴十八年増築遥堤一道長六百丈陽武縣縣治在河北職官見北㟁黄河南㟁長堤西自原武堤界起經本縣申家莊穆家莊東至中牟縣堤界止長十八里鄉堡夫十八名堡房九座中牟縣北㟁東北陽武縣北㟁西北原武縣槐疙疸青孤堆李仲英寨陶家店時和驛中牟縣知縣管河縣丞黄河南㟁長堤西自陽武界起經本縣小渾溪新莊原墩寺朱姑村東至祥符界止長三十八里鄉堡夫四十八名堡房十九座劉獸醫口埽壩逼臨河濱水漲則上勢必難守萬歴十七年築遥堤一道長二千七百三十二丈每歲守月遥二堤縱漫浸壩亦可無虞陶家口洪武二十四年河決陽武縣由陳頴入灌陶家口係險要處所宜壩埽正當直射萬歴十八年増築遥堤一道長一千八百七十一丈張家灣時和驛逼近省城冲刷甚急慮恐堤岸難守萬歴十八年増築遥堤一道長一千五百丈開封府祥符縣河北岸西北封丘縣河北岸東北直𨽻東明縣兎伯岡祥符縣知縣管河縣丞黄河南岸長堤西自中牟堤界起經本縣瓦子坡劉獸醫口平城店張家灣黄金壩董盆寺埽頭集東至陳留堤界止長一百七十三里徭堡夫一百七十三名鄉堡夫八名堡房八十六座􅇠伯堽至埽頭一帶止有單堤一道尤恐冲潰黄水奔走鳯泗與李景髙口為患相同萬歴十八年増築遥堤一道長二千九百三十丈隆慶六年所築縷堤自祥符縣起至直𨽻碭山縣止崇禎十六年流賊李自成決黄河開封府潦沒明宗室士民及田廬一空陳留縣北岸西北封丘縣北岸東北宜𨽻東明縣李家樓陳留縣知縣管河縣丞黄河南㟁長堤西自祥符堤界起經本縣胡家堂東至蘭陽堤界止長十八里鄉堡夫二十四名堡房十二座蘭陽縣北㟁西北封丘縣東北東明縣七村趙皮寨李景髙普家營蘭陽縣知縣管河縣丞黄河南㟁長堤西自陳留界起經本縣七村堤東至儀封堤界止長七十八里鄉堡夫二十五名徭編夫十五名堡房二十座嘉靖七年開趙皮寨白河一帶分殺水勢嘉靖十三年河復决趙皮寨入淮水色忽白夏邑縣泰丘回村等集冲數口轉行東北流經蕭縣仍出徐州小浮橋下濟二洪嘉靖十九年河決野鷄岡由渦河入淮二洪告涸開濬李景髙口支河引水出徐州濟洪閲二年亦淤萬厯十七年河決李景髙口冲葛月堤入睢陳故道尋即塞之十八年自趙皮寨起至本口剏築遥堤一道長二千三百五十九丈儀封縣北㟁東北直𨽻東明縣北㟁西北封丘縣石家樓王家寨儀封縣知縣管河主簿黄河南㟁長堤西自蘭陽堤界起經本縣薛家口時家樓東至考城堤界止長九十六里堤夫六十六名堡房三十三座儀封縣東北䕶城堤起至石家樓止長五十八里歸徳府河捕通判管黄河南㟁北㟁考城商丘虞城三縣防河長堤二道南㟁一百五十六里北堤見北㟁王家集起至考城縣䕶城堤一十七里二百四十步考城縣北㟁東北兖州府曹縣北㟁西北直𨽻東明縣考城縣知縣管河主簿黄河南㟁長堤西自儀封界起經本縣顔家集東至商丘堤界止長六十里堤夫六十名招選附近居民無工食亦無課程歸徳府商丘縣北岸