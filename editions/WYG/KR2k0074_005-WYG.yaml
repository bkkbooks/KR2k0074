乾出流民盡歸耕作鳯泗免冲潰之虞歸仁堤所以捍禦黄水睢水湖水使不得南射泗州並攻髙堰而又遏睢水湖水使之併入黄河盖築冲刷關係最為重大每歲三月間即當播洪夫三百餘名協同本堤夫併力修䕶堤下宜密栽茭栁以塘風浪其水浸堤根利深處即預下䕶埽一二層樁笆欹朽者務逐一掘換填築内四鋪以至九鋪尤為危險工宜倍之每歲冬春宜多運樁􅐨繩草分貯各鋪其管河主簿督令專駐本堤以便督率前歲議築石壩以工力不足僅成二千一百丈尚餘二千九百丈若得全完幇䕶之工可免矣然其槖籥則又在小河口之謹塞盖小河通則睢水徑入黄河而歸仁之水減半其藩籬則又在耿車時兒灘一帶之堤盖此堤髙厚堅固則睢水不能浸入埠子等湖而小河常通矣故上自髙車下至時灘皆當接築長堤歲加修守且密栽茭栁以䕶之盖修守此堤即所以修守歸仁也况小河常通則靈睢宿遷積水得泄而沮洳漸成膏腴舟行徑直免犯湖險而小民便於販易其為地方利非淺鮮也司河者宜加意促成之孫家灣烟墩桃源縣北㟁東北清河縣北㟁西北宿遷縣馬厰坡腰鋪烟墩險工王簡張福堤桃源縣知縣管河主簿添設同知主簿各一員黄河上自宿遷古城起至清河駱家營止長八十五里南㟁烟墩龍窝二險工及李家口談家灣髙家灣陸家壩南㟁遥堤自烟墩舊大王廟起至馬厰坡止長七千二百九十六丈淺夫七十三名桃源縣地方有馬塲坡横堤長七百四十六丈盖慮黄水大漲則從此入淮而淮為之淤淮水大漲則從此洩出而清口流弱故特築横堤一道以遏之使黄不得入淮不得出最為𦂳關宜慎修之桃源河南㟁有諸決口自馬厰坡南奔入淮而北㟁又決崔鎮等口故正河淤墊今北面既築遥堤而南面因馬厰坡一帶髙崗横築斜堤一道兩堤夾挾自無奪河之患中河分司淮楊道兼轄淮安府管山清河務同知駐劄本府清河黄河南㟁西自桃源界吳城起東至運河口二十五里又自運河口起至山陽界李家淺止八里又自運口起至文華寺迤東七里墩山陽界止計七里清河縣治在河南職官見南㟁王簡張福堤在清河南㟁淮水從此二口洩入黄河致分淮水之力而清口淤淺且黄水泛漲亦能倒灌入淮今築堤捍之淮無所出黄無所入而清口之力專矣淮河口通濟閘河北岸清河縣新莊閘漕運咽喉閘官一員夫三十名河南岸天妃壩石工惠濟祠後樁草工係官工甘羅城清江浦堤西橋􅂻壩係當直射之處且逼近淮城最為險要今砌西橋石工九十八丈裡壩石工一百餘丈中河分司淮揚道兼轄淮安府新設管河山旴同知淮安府山陽縣徐家壩栁浦灣厰盧浦羊寨各套廟灣山陽縣知縣管外河主簿黄河南㟁自清河界李家淺起至北沙止三百一十里内極險則有王家堤石工新溝建儀蘓嘴淤工馬邏五大樁埽險工又條堤内之顔家河真武廟原係官修又潘家滛塞周艾口張蒯賈三滛茭清七溝侍家塢四堡溝北沙等口原係民修栁浦灣厰馬邏巡司羊寨巡司歲守淮城北㟁遥堤清江浦起由栁浦灣至髙嶺止共堤一萬六千九十一丈近又加至戴百户營止共堤八千一百五十六丈向來置之若棄萬歴十三年范家口一决淮城幾為魚鱉工費不貲復還故物今設大使一員夫五百名專守一帶堤岸乃淮安城北外捍殊為喫𦂳如有汕刷隨宜修補倘遇大有損動此於堤内有産之家量起夫役相幇修築伏秋之時選撥省祭隂醫等官畫地分守仍須預備樁草繩葦之𩔖各安置要害處所以待不時之需每歲冬春之交即預行申飭山陽縣自今河由草灣正河俱淤殊不足慮然河性不常一旦忽歸正道修守之法仍須誌之守徐家壩清河以下黄淮二凟交流注海越五十里一大折於淮郡之西橋又三十餘里一大折於徐家壩其冲激怒號之勢無異西橋前此治者屢壩屢壊為與水争尺寸地耳今議棄舊址只營月壩去水稍逺令無湍流外䕶樁埽用實壩基事省功倍良得築也毎歲𣲖撥官夫預備物料伏秋將屇專責山陽縣令督管河主簿不時巡視少有圯壊輙先綜理年復如斯斯永頼之兩河清彚卷五
