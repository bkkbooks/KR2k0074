body:
  text: 兩河清彚卷八益都薛鳯祚撰黄河芻論治河以得人為要論自古有治人無治法天下事皆以得人為難而治河為尤難必有人溺已溺之心而又有應變無方之才有盡瘁鞠躬之忠而又有一介不茍之操至于衆咻不恤任怨不辭又非有特立不移之定力不可也逺年無論已近明二百餘年河工獨推潘印川季馴觀其歴事三朝二十餘年多底定之功而立言垂論皆足為後世法誠得人也圖治者不求才于異代誠能于在廷諸臣廣詢博采求其能盡心河務者充總河之選推心任之得其人則政舉何患不慶平成之勲哉至于分任督課則分司及道員職也其需才猷敏鍊勞怨不辭尤不可不慎擇者而其職任則分司不如道員道員有總轄州縣之權呼應即靈而分司之事權不同也道員雖亦挨奉升遷然可以久任成功分司之差滿輪換計日即更者不能也今淮屬有道揚屬無道邳徐桃清南㟁有道北岸無道所當急議者也至于有司以及佐貳各有耑任責成而責成河官不如責成印官印官職掌守土比閭之民皆其撫馭一號召間即夫役也帑藏之財皆其典守一措置間皆物料也而河官不能也今管河道㕔以及佐貳皆有成例得以坐名題補其臨河要地州縣徃徃人地不宜迨有毁蹟而後以彈章從事則何益哉至于其平居令河官常駐要地不許委署他務搶修令印官親赴工次不得安居私署亦河工責成之要務也上下皆得人而又嚴每歲舉劾之典申久任課蹟之令賢否勤惰勸懲有法心何由不思奮防務何由不振飭哉歲辦物料河工之役大抵初決之時工程㣲小若掃料有餘何難勒限告竣祗因掃料缺不得不停工以候所以遲之又久而日甚一日役夫則動至數千糜帑則動至巨萬當于每歲十月踏勘明白兩河要害分别首冲次冲又次冲何者為大修小修添修所用人夫樁􅐨柴草等項若干数目於各險工之下設厰堆貯設有急工應時擋䕶堵塞其視急取逺求停工以待者霄壤矣若險工要害預備物料若能先事預防保固無虞至於一年二年者亦照堵塞冲決之工一例優叙更激勵人心之大權要術也河流首冲宜行疏導河流當冬春之時皆掃灣回溜冲刷堤根其水勢緩流之處必淤澱沙灘如水射北則灘在南水射南則灘在北此一定之形勢也及伏秋水發從來冲刷之處竟成頂冲當此之時即築堤數道斷不免于潰決矣諳曉河勢者相度時勢凡當春秋水涸之時于淤灘壅澱之處挑控引河待伏秋水發乗其湧漲之勢即可引流入渠使頂冲之勢少減隨於頂冲之處就堤幇築加埽擋䕶自可免于潰決如儀封之王家庄祥符之陳橋陳留之孟家埠皆其𩔖也挑引河開放事宜詳本朝治河篇治河疏塞先後之宜今之治河以堤築為上䇿但治之河有先疏而後塞者有以塞為濬者昔劉忠宣治張秋決河濶九十餘丈行視之曰是下流未可治先治上流發丁夫數萬疏賈魯舊河孫家渡諸河道使南流以殺其勢後于沿河張秋兩岸築臺立表實土下埽決口既塞繚以后堤此以濬為塞者也潘印川塞髙堰黄浦崔鎮等口大小二十九決而沙刷水深兩河歸正海口自開此以塞為濬者也豫省河臣經理前後諸險工或先事豫防開引河以分其勢或臨時搶築堤埽以塞其冲能有成效可為善師古人之意者矣接築桃清南岸大堤清口為黄淮交㑹之處雖挑濬淮渠使通流以拒黄水但慮黄流漲溢清口迤西全無堤岸勢必黄水漫入清口淤塞宜于清口迤西築長堤一道與桃源築成之堤接連一體或樁板或議石工以防汕刷庶二水不得漫溢旁流各安其所同歸海矣開七里溝引河以鞏北堤桃源縣迤東七里溝黄家嘴上下數十里比年以來決凡數次堵塞未幾旋復壅潰總因河勢北徙離堤偪近而又河地卑下每值漲溢孤堤易傷潰決之患全在於此今幸堵塞善後之計當殺河勢欲殺河勢當挑引河相度上源龍灣之處施工挑挖則與北堤離逺逺則河水難冲又引河直截順流則河水易㵼形勢得所矣至所挑引河口濶二十五丈渠濶十五丈深一丈二尺又于一丈二尺之下再挑多坑溝伏秋水漲開放又下唇及截河大壩一一如法河勢漸變從此相機疏築善後之機當得其宜矣築石城至清河北岸遥堤桃源迤帶祗有單堤一道而又逼近河岸堤單則力孤逼河則冲激特甚伏秋漲決在所不免向經估計南北兩河岸遥堤自宿遷至清河工費浩大今酌量𦂳要劇工自古城至清河先築北岸遥堤計地較近工費少省而黄家嘴一帶險要可恃無恐此重門禦暴之意亦復容節制之良法也建減水壩以殺水勢搶築河患莫如挑引河然須上源有迎溜頂冲之處不然則挑濬難施惟有建減水壩分決口之全流兩壩搶築可計日而施考河防書所載徐升季太等壩盖因下流清口相距三四十里特築此壩以分殺逆流之勢立法最善若後有決口之處雖挑引河者倣其意而推廣之將見石壩既設遇有滔漲即開放分流利頼非細且不特此也中州以逮淮徐兩岸不茅之地或數十頃或數百頃建一石壩沙醎之地數日之間立成膏腴其利頼亦非細也但築基湏髙于平地二尺餘以便洩異漲之水存恤夫役守堤夫役原有額設工食並免本身雜差優恤既加方可責其防守今各夫既有風雨晝夜防守之辛勤又有芟攬栁麻課程之歲辦且夫搭盖茅房修理器具工食無幾不足供其應用更有指名花費侵吞或稱上司過往或稱上差酒飯或經丞需索常例或衙官借題津送一年工食幾何數端刮削已盡且既暗補課程草棲露宿于堤上又復供應雜汛左支右舞于門庭一身數役勞􅉵不堪抛産逃亡棄堤不守勢所必有此言之真可痛心聞之真堪髪指者也嚴禁釐革寧容少貸河夫逃亡河夫逃亡之弊積久相沿其上工或數日半月一月即報逃亡報逃申解躭延時日遲誤工程或做半月之工而索一月之餉或解役通同攬頭打逃折銀甚有官吏包攬因而報逃重入輕出又或管工人員私賣輕夫衆夫偏累以致逃亡有此弊端所以報逃接踵不休嚴剔釐革不特夫役無累而河工之功成有望矣修守事宜一築堤凡黄河堤必逺築大約離岸須三二里庶容蓄寛廣可免決齧切勿逼水以致易決堤之髙卑因地勢而低昂之先用水平打量毋一槩以若干丈尺為凖務取真正老土每髙五寸即夯杵三二遍若有淤泥與老土同第須取起晒凉候稍乾方加夯杵其取土宜逺切忌傍隄挖取以致成河積水刷損隄根驗隄之法用鐡錐筒探之或間一掘試隄式貴坡切忌陡峻如根六丈頂止須二丈俾馬可上下故謂之走馬隄計工費凡創築者每方廣一丈髙一尺為一方計四工土近者每工銀三分最近者二分土逺者四分如隄根六丈頂二丈須通融作四丈折筭此計土論方之法也如幇隄則先計舊隄若干今増髙濶各若干亦以前法折算方法假令徐州𤣥黄二舖月隄計長八百五十丈根濶五丈頂濶一丈四尺並之咸半得三丈二尺髙一丈二尺以乘三丈二尺得每丈計三十八方四分以乗八百五十丈共三萬二千六百四十方每方四工計工一十三萬五百六十該銀三千九百一十六兩八錢如難築每方量加二三工不等一塞決凡隄初決時急將兩頭下埽包聚官夫晝夜㸔守稍待水勢平緩即從兩頭接築如水勢洶湧頭裹不住即於本堤退後數丈挖槽下埽如裹頭之法刷至彼必住矣皆謂截頭褁也如又不住即於上首築逼水大壩一道分水勢射對岸使回溜衝周正河則塞工可施矣塞將完時水口漸窄水勢溢湧又有合口之難須用頭細尾粗之埽名曰䑕頭埽俾上水口濶下水口收庶不致衮失而塞工易就也埽以土勝為主埽臺須要卧羊坡以便推挽揪頭繩須要𦂳扯以防下游又須時時打鬆令其深下仍覔慣㑹泅水之人入水探騐底埽着地方下簽樟須要酌中埽埽釘着方為堅固倘有數寸空懸無有不敗事者如寒天或水急不能泅水即㸔揪頭寛鬆便是着地之驗繫繩留橛令人專守畧有走動便須另下一橛橛頭上填記第幾埽揪頭滚肚明白以便㸃查收放埽面出水未髙寧加一小埽不可多用土牛推埽時易動故也此等事須要勇往直前俗諺謂之搶築稍稍逗遛必有後悔以上數端茍不詳密勞費罔功輙疑鬼怪甚可嗤也物料工費萬歴十五年總院照時值裁定以下皆同如用大埽長五丈髙六七尺者用草六百束每束重十斤價銀二釐該銀一兩二錢栁稍一百二十束每束重二十斤價銀一分該銀一兩二錢如無栁稍以葦代之草繩六十套毎套四十二條每條長二丈四尺價銀三分該銀一兩八錢樁木五根每根銀一錢該銀五錢楸頭滚肚繩四條其用􅐨二百五十斤每斤價銀五釐該銀一兩二錢五分毎大埽一個約共該料價銀五兩九錢五分中埽並土牛工料以次逓減挑土夫工逺近不等難以預定臨時酌給謹按物力豐勝時價值如此今且四五倍之民力重困須依時價逓加一築順水壩順水壩俗名雞嘴又名馬頭專為喫𦂳迎溜處所如本隄水刷洶湧雖有邊埽難以久恃必須將本隄首築順水壩一道長十數丈或五六丈一丈之壩可逼水逺去數丈隄根自成淤灘而下首之隄俱固矣安埽之法上水廂邉宜出將裹頭埽藏入在内下水埽宜退藏入裹頭埽内庶水不得掲動埽也如築長六丈濶四丈髙一丈用埽兩面廂邊每邉用埽二行裹頭二行中間填土每行用埽三層共計用中埽十八個每個長五丈三尺用草四百束栁稍八十束草繩四十條排樁簽樁共用樁木四根人夫二十五工共用捲埽堤夫四百五十工運土隄夫二百工共用草七千二百束該銀一十四兩四錢栁稍或葦一千四百四十束該銀一十四兩四錢草繩七百二十套該銀二十一兩六錢樁木七十二根該銀七兩二錢行繩十二條每條重四十斤共用􅐨四百八十斤該銀二兩四錢約共該銀六十兩如無栁稍以葦代之人夫俱不議工食一下䕶根乾埽凡隄係掃灣須預下乾埽以衛堤根此埽須土多料少簽樁必用長壯入地稍深庶不坍蟄如下長三丈髙三尺埽一個用草一百六十束該銀三錢二分栁稍四十束該銀四錢草繩十二套該銀六錢樁木三根該銀三錢量用􅐨作行繩用堤夫二十工不議工食毎埽一個約共該料價銀一兩六錢二分一造滚水石壩即減水壩為伏秋水發盈漕恐勢大漫堤設此分殺水勢稍消即歸正漕故建壩必擇要害卑窪去䖏堅實地基先下地釘樁鋸平下龍骨木仍用石楂鐡縫方鋪底石壘砌鴈翅宜長宜坡跌水宜長迎水宜短俱用立石攔門樁數層其地釘樁須劄鷹架用懸硪釘下石縫須用糯汁和灰縫使水不入如石壩一座壩身連鴈翅共長三十尺壩身根濶一丈五尺收頂一丈二尺髙一尺五寸迎水濶五尺跌水石濶二丈四尺四鴈翅各斜長二丈五尺髙九尺用粗細石計長一千三百九十餘丈並地釘樁龍骨木鐡錠鐡銷煤灰木炭石灰糯米檾麻及各匠工食約共該銀一千九百餘兩其運石擡石搬料夫船並官夫廪糧工食臨期酌給一建石閘建閘節水必擇堅地開基先挖固工塘有水即車乾方下地釘樁將樁頭鋸平縫上用龍骨木地平板鋪底用灰麻艌過方砌底石仍于迎水用立石一行攔門樁二行跌水用立石二行攔門椿八行如地平板鋪完功過半矣自金門起兩面疊砌完方鋪海漫鴈翅金門長二丈七尺兩邊轉角至鴈翅各長五丈共用石三千一百尺閘㡳海漫攔水跌水共用石九百尺二項共用石四千尺並鐡錠鐡銷鐡鋦天橋環地釘樁龍骨木地平板萬年坊閘板絞關閘耳絞軸托橋木石灰香油蔴麻柴炭等項及各匠工食約共該銀三千兩有竒其官夫廪糧工食臨期酌給一建涵洞建涵洞以洩積水其址亦擇堅實方可下釘樁砌石水多則建二孔少則一孔如涵洞一座口濶一丈五尺身長二丈中立石墻一堵亦長二丈寛五尺分為二孔每孔寛五尺兩邊四鴈翅各一丈五尺共用石二百丈並地釘樁鐡錠石灰板木並各匠工食約該銀一百八十餘兩其夫役工食臨期酌給一建車船壩先築基堅實埋大木于下以草土覆之時灌水其上令軟滑不傷船壩東西用將軍柱各四柱上横施天盤木各二下施石窩各二中置轉軸木各二根每根為竅二貫以絞關木繫蔑䌫于船縳于軸執絞關木環軸而推之一挑河凡挑河面宜濶底宜深如鍋底様庶中流常深且岸不坍塌如不用隄須將土運于百餘尺外以免淋入河内凡創開河者毎方廣一丈每夫日開深一尺為一工挑濬泥水相半者減十分之五全係水中撈取者減十之七八取土登岸就而築隄者亦以半折算焉一閘河偶淺急疏之法凡閘河淺處如水溜在中須兩㟁築丁頭壩以束之水溜在傍將淺邊順築束水長壩以逼之水由壩中其勢自急中溜自深如淺處不多或排板挿下泥内逼水湧刷或排小船用杏葉杓挖濬必不得已則用樁草製活閘節水亦一䇿也一栽栁䕶堤卧栁長栁須相兼栽植卧栁須用核桃大者入地二尺餘出地二三寸許栁去堤址約二三尺密栽俾枝葉搪禦風浪長栁須距隄五六尺許既可捍水且每歲有大枝可供埽料俱宜于冬春之交津液含蓄之時栽之仍須時常澆灌長栁宜用棘刺圍䕶以防盗㧞畜嚙一栽茭葦草子䕶隄凡隄臨水者須於隄下密栽蘆葦或茭草俱掘連根叢株先用引橛錐窟深數寸然後栽入計濶丈許將來衍茁愈蕃即有風不能鼔浪此䕶臨水隄之要法也隄根至面再採草子密覆一伏秋修守四防一曰晝防隄岸每遇黄水大發急溜埽灣處所未免刷損若不即行補修則埽灣之堤愈漸坍塌必致潰決宜督守隄人夫每日捲土牛小埽聴用但有刷損者隨刷隨補毋使崩䣃少暇則督令取土堆積隄上若子隄然以備不時之需是為晝防二曰夜防守堤人夫毎遇水發之時修補刷損隄工盡日無暇夜則勞倦未免睡熟若不設法巡視恐夤夜無防未免失事須置立五更牌面分發南北兩岸恊守官並管工委官照更挨發各鋪𫝊逓如天字鋪發一更牌至二更時前牌未到日字鋪即差人挨查係何鋪積遲即時拿究餘鋪倣此隄岸不斷人行庶可無誤巡守是為夜防三曰風防水發之時多有大風猛浪隄岸難免撞損若不防之于㣲久則坍薄潰決矣須督隄夫綑札龍尾小埽擺列隄面如遇風浪大作將前埽用繩樁懸繫附隄水面縱有風浪隨起隨落足以䕶衛是為風防四曰雨防守隄人夫毎遇驟雨淋漓若無雨具必難存立未免各投人家或鋪舍暫避隄岸倘有刷掃何人㸔視須督各鋪夫役每名各置斗笠簔衣遇有大雨各夫穿戴隄面擺立時時巡視乃無疎虞是為雨防二守一曰官守黄河盛漲管河官一人不能周巡兩岸須添委一協守職官分岸巡督每堤三里原設鋪一座每鋪夫三十名計每夫分守隄一十八丈宜責每夫二名共一叚於隄面之上共搭一窩舖仍置燈籠一個遇夜在彼棲止以便𫝊逓更牌巡視仍畫地分委省義等官日則督夫修補夜則稽查更牌管河官並協守職官時常催督巡視庶防守無傾刻懈弛而隄岸可保無事矣二曰民守每鋪三里雖已𣲖夫三十名足以修守恐各夫調用無常仍須預備宜照往年舊規於附近臨隄鄉村每鋪各添𣲖鄉夫十名水發上堤與同鋪夫併力協守水落即省放回家量時去留不妨農業不惟隄岸有頼而附隄之民亦得各保田廬矣一竪立旗杆燈籠以示防守各鋪相離頗逺倘一鋪有警别鋪不聞有誤救䕶須令隄老每鋪竪立旗杆一根黄旗一面上書某字鋪三字燈籠一個晝則懸旗夜則掛燈以便瞻望仍置銅鑼一面以便轉報一鋪有警鳴鑼為號臨鋪夫老挨次𫝊報各鋪夫老併力齊赴有警處所即時救䕶首尾相顧通力合作庶保萬全一防盗決守隄之法隄防盗決最為喫𦂳盖盗決有數端坡水稍積決而洩之一也地土磽薄決而淤之二也仇家相傾決而灌之三也至於伏秋水漲處處危急隣隄官老隂伺便處盗而洩之諸隄皆失保守四也巡警稍怠或乘風雨之時或乗酣睡之處即被下手矣防禦者不可不知一議涵洞涵洞洩水本是無妨但須明設石閘以嚴啓閉若暗開隄址草木䝉叢便難覺察萬歴八年奸民私囑管河主簿將南岸遥隄暗開涵洞數座十七年伏水暴漲單家口水從涵洞洩出勢甚洶湧一鼓而開遂成大決此可謂明鑑矣司河者知之一歲辦物料河防全在歲修歲修全在物料而州縣河官視為寄貨歲估既定冒銀入已括取里逓草束河夫攀折栁稍遮掩一二便為了事近日徐州判官彭鶴靈璧主簿元仲賢之事可鑒也今議于十一月間司道官估計停當各掌印官領銀收買法固善矣又須特委亷能職官一二員專管收支工完之日將捲築過埽壩收支過物料數目開報總河衙門查考庶幾事有責成而錢糧無冒破矣又冬初修守稍暇即督夫于漫坡中採取野草每束十斤者每夫每日可採四十束積至百萬可省千金禆益非小草料既備埽䕶必周衝決之患可免即脱有不測而物料在手計日可塞何致延閣糜費此河道第一喫𦂳工夫也一水汛立春之後東風解凍河邊人候水初至凡一寸則夏秋當至一尺頗為信騐謂之信水二月三月桃花始開氷泮雨積川流猥集波瀾盛長謂之桃花水春末蕪菁華開謂之菜華水四月壠麥結秀擢芒變色謂之麥黄水五月𤓰實延蔓謂之𤓰蔓水朔野之地深山窮谷氷堅晚泮達乎盛夏消釋方盡而沃蕩山石水帶礬腥併流於河故六月中旬之水謂之礬山水七月菽豆方秀謂之豆華水八月荻薍華謂之荻苖水九月以重陽紀節謂之登髙水十月水落安流復其故道謂之復槽水十一月十二月斷水雜流乘寒復結謂之蹵凌水此外非時暴漲謂之客水皆當督夫巡守而伏秋水勢最盛非他時比故防者晝夜不可少懈云分督河工凡修建大工工程浩大道里遥逺若非多官分理畫地責成不免顧此失彼今以萬歴六年戊寅總院防河自徐州以下至儀真分撥一案為例遇有興作依此為法徐州自吕梁洪至邳州直河止一帶遥堤七十里該海防道總管自桃源縣古城以下遥堤六十里并塞界内缺口及陵城滚水壩一座該淮北分司總管自桃源縣界至清河獾墩止遥隄六十里並塞界内缺口及安娘城滚水壩一座該管河道總管徐州𤣥黄二鋪月隄並靈睢界内遥堤五十餘里及崔鎮口滚水壩一座該徐州道總管自睢寧界内遥堤四十餘里并築歸仁集堤三十五里該潁州道總管自睢寧界内遥堤四十餘里并築歸仁集堤三十五里該潁州道總管修復淮安板閘至新莊閘共四閘修復裡河兩堤并新城北一帶幇築新舊堤及塞黄沛口該水利道總管管髙家堰中叚塞天妃閘朱家口開復通濟閘修築趙家口迤西堤岸修復仁義等五壩該管河郎中總管築寳應一帶土石堤并建減水閘及挑濬揚州至儀真一帶河道該南河分司管以上司道八員均分八大工每司道一員督府佐二員計用府佐一十六員每府佐一員分督州縣佐貳首領隂醫省祭官十員共用一百六十員聴總督河道於所屬地方掄才吊取如員數不足及各官間有經手要務妨占者河臣於附近省分有司内查幹濟素著者具奏調用河防緒言河行地脉所宜朱子曰黄河是地中大血脉來朝則國家阜寧洩去則耗敗自然之理朱子曰元豐間河北流自後中原多事後來南流北方多事而世説潤百里平時無所考證皇清順治七年河決而北由千乗等處舊河故道入海一時魚米充盈一切古道舊渠悉成長流數百里内民間磽瘠墨地不宜五穀者皆得倍收可想上古河在北方豐勝氣象河防永頼黄河之為患久矣至于今日無嵗不治生民之膏血㡬盡筋力㡬盡有道于此能令河永不決即暫決亦無大害不久復歸大河誠斯世斯民之大幸也常細求黄河之性並古來治河之成法皆云無一勞永逸之功惟有補偏救弊之法又云世世守之世世此河也於此窮究其必然之理與其必可能之事則此補偏救弊之内即有久安長治之䇿釐為數種俟有心世道者採擇焉河決之由凡河患先從決口而決口奪河非遽奪也決而不治河之流日緩墊沙日髙河始改從決口耳有遥堤以適其性而範其狂有減水壩以洩其勢而殺其怒當不至如往日之常決縱一偶決水退塞令還槽循軌可以日計不足患也查理舊置遥堤遥隄範圍寛廣泛溢之水偶至堤下或髙數尺亦無即決之理近河士民皆云河決多係新堤舊堤少有決者此今人用心不如古人之騐也堤之足以防河也審矣人不知遥堤一線實司國計民生之大命􅉨􅉨置之若棄車馬之所踐躝風雨之所剥蝕卑薄有不及往日之半者今當細細查騐増髙増厚仍以鐡錐筒騐試不許有一寸鬆懈而堤之決者鮮矣遥堤不潰即河偶泛溢亦不為害國計民生或少得休息乎堤係沙土則不必論堅瑕皆當改築盖沙能漏水漏水則易潰鐡錐筒騐試遇之即行添補或以為無事之時多此工費而河工經制原有每歲修補之例但當求其實用不可以虚應塞責耳且思古人築行堤動幾百里修補之工百不一二而云勞乎且黄河一潰内帑之出民間之耗而工至十萬幾十萬修補之費特其㣲末而云費乎栁堤堤内植栁古有其制以禦溜水衝刷之患誠良法也然人但知栁之足以䕶堤而不知栁之自足為堤不知栁之為堤較土之為堤其費不及百之一二而其為用更勝于土之為堤也今濱河遥堤所在不闕遥堤内五尺密裁栁一行每里一千零八十尺每五尺一栁計用栁枝十束值銀四錢又横植十行值銀四兩二千里河堤止用銀八千兩又另成一遥堤矣二三年之間決水偶至遥堤經此栁堤以為之障斷無能破遥堤之理遇有水溜迅激之處斷樹留根横植水旁即龍尾埽也斜置多用即磯嘴馬蹄等埽也所費甚省而成功甚速非萬世永頼之業乎十年之計種樹遇有埽決取之不盡濵河舟載或可栰制其便更甚初行恐栁栽難求可令近堤有力之家助其採辦至於工費則不可省守堤責成土堤不可無守而栁堤更不可不守往歲栽植䕶堤之栁今安在乎皆以守㸔無人稽查廢法而斧斤牛羊凌沒至盡耳舊制每遥隄三里用夫三十名㸔守遇伏秋又益以附近民夫十名今專力責成其三十人管一舖三里者恐途逺耳目難及宜一里所用人十名中立一甲長工食倍之其九人通融管一里更於附近置田十數畝為其永業令其即家於此若嫌孤零即二三甲同住亦可栁堤之守看修植悉司之數年後少有柴薪桑條之例亦付之則栁成而堤固而河患永除非萬世永頼之業乎格堤遙堤之固至此永免冲潰而又有不可少者則格堤是也河至遥堤不歸本河亦可慮也今各處各有横堤斜行迤邐入河河之泛溢遥堤内者遇格即止仍歸大河若擇無横堤處所處處添置栽栁置守一如大堤永絶河患非永頼之業乎重學河工惟築堤築決為上䇿勤勞民力至不容已矣而堤塞之工尚有可從省易者今有重學一法畚土之器以機發之􅉨􅉨一人可當三四人至易而簡遇有興工如用丁夫十萬止用四五萬而足民力國計並有禆益曰土車曰石夯曰石杵每器各置一式為觀者一笑兩河清彚卷八
