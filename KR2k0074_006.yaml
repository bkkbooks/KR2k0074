body:
  text: 兩河清彚卷六益都薛鳯祚撰黃河黃河北岸北岸過潼關至懷慶府河內縣濟水北來入河濟水出濟源縣河南岸陜州經孟津南岸東南澠池縣至懷慶府河內縣入黃河南岸孟津縣武陟縣東沁河北來入河沁河發源于沁州綿山穿大行達濟源縣至懷慶府武陟縣與黃河合其湍急之勢較黃河益甚而武陟縣東岸之蓮花池金屹􅨅最其沖射要害之處也萬歷十五年沁從此決新鄉獲嘉一帶俱為池沼每年堵築掃壩勞費不資且壩為商民輳集之處煙㸑不下千餘倚堤為命今議甃石四百三十五丈隨守隨修限以三年告成此堤一成永久可恃而議者畏難尚未興舉其北岸大樊村亦係掃灣要害幫堤捲掃均在司河者留意焉詹家店萬歷十六年創接堤四百八十五丈五尺沁水入河之後北岸逼近漕河關係運道最為緊要如滎澤縣之甄家莊郭家潭陽武縣之脾沙堽原武縣之廟王口封丘縣之于家店中濼城荆家口祥符縣之黃陵岡陳橋貫臺馬家口陳留寨蘭陽縣之銅瓦廂板厰樊家莊張村集馬坊營儀真縣之穵泥河煉城口榮花樹三家莊考城縣之陳隆莊芝麻莊孝城口係為要害河南管河道轄開封府北河同知駐陳橋鎮專管北岸滎澤原武陽武封丘祥符陳留蘭陽儀封八縣防河長堤三百一十一里滎澤縣治在河南岸職官見南岸黃河北岸長堤西自武陟界起東至原武界止長八里堤夫六名堡房三座廟王口係掃灣去處恐縷堤難支萬歷十八年增築遙堤一道長一千一百五十五丈原武縣南岸鄭州賣家賽原武縣知縣管河主簿北岸長堤西自滎澤界起經本縣廟王口胡村鋪東至陽武界止長五十里堤夫三十二名徭夫十六名堡房十四座買家寨萬歷十八年創築月堤一道長九百丈陽武縣南岸西南中牟縣南岸東南開封府脾沙岡中灤城陽武縣知縣管河主簿北岸西自原武界起經本縣潭口寺脾沙岡東至封丘界止長四十里堤夫二十四名徭夫十二名堡房十六座脾沙岡隆慶元年築壩係掃灣去處每歲須下掃捲築于家店荆隆口中灤城三處相連最為險要每歲捲掃固壩覔土加堤防守荆隆口𢎞治二年河決沖張秋萬歷十五年又決長東二縣幾致泥溺遂塞十七年創築遙堤一道長二千九十丈封丘縣南岸東南開封府南岸西南中牟縣陳橋集貫臺馬家口陳留寨銅瓦廂板厰樊家店張村集封丘縣知縣管河主簿北岸長堤南自陽武界起經本縣于家店荆隆口東至祥符界止長四十里堤夫五十名徭夫二十六名堡房二十九座祥符縣治在河南職官見河南岸北岸長堤西自封丘界起經本縣陳橋集馬家口回回寨東至陳留界止長五十八里堤夫五十六名堡房二十八座陳留縣治在河南職官見河南岸北岸長堤西自祥符界起東至蘭陽界止長二里堡夫四名堡房二座直𨽻大名府屬長垣東明二縣舊有長堤一道延亘一百三十里東至山東曹縣白茅堤西至河南封丘縣新豐村止堤外即有淘北河一道相傳即黃河故道也萬歷十五年河由河南封丘縣荆隆口決水挾淘北河沖決本堤之大社口兩邑昏壂該工都科給事中常會同撫按題修築完然堤外有月堤三壩名曰三尖口吳家口劉家口在長垣利在泄水不肯閉塞在東明懼其受淹堅欲堵截兩相掣肘雖有壩名終屬虛應即今長垣專設府佐駐守杜盛集而又畫界分理長垣縣管九十七里東明縣管三十三里建鋪設夫以時修守堤既固矣三壩有無不足較也夫壩之有無係于長堤而堤之利害全在荆隆一帶故添設開封府同知專駐劄荆隆雖衛河南實衛長東二縣也總之荆隆堅守則長堤無事長堤無事則三壩不用二縣之民永帖衽席此探本窮源之論不可不知也長東河官須時時偵探荆隆口堤岸少有沖汕即申總河施行陳留寨銅瓦廂舊係沖擊去處每歲幫築防守蘭陽縣治在河南岸職官見南岸北岸長堤西自陳留界起經銅瓦廂板厰商家營馬家營東至儀封界止長四十九里堤夫四十四名徭夫三十六名堡房四十座直𨽻大名府長垣縣南岸西南蘭陽縣南岸東南儀封縣杜盛集大名府管河廳馬房營河南岸蘭陽縣係掃灣去處猶恐縷堤難支今於背後創築月堤一道縷堤改為月壩每歲慎加修防儀封縣治在河南職官見南岸北岸長堤西自蕭陽界起本縣扼泥河小宋集三家莊東至考城界止長六十四里堤夫五十二名徭夫三十六名原額蘭陽撥儀封煉城口徭夫二十六名堡房五十三座煉城口河南岸東南儀封縣掃壩最為喫緊每歲宜下廂邉掃護之榮花樹河南岸儀封縣掃壩長一千二百六十丈係迎溜去處每歲加工修守王家莊河南岸西南儀封縣掃壩正當河身已被沖塌萬歷十八年退裡預築掃壩一道河南管河道轄歸德府河捕通判除南岸外管河北岸三十二里管考城縣歸德府考城縣治在河南岸職官見南岸北岸長堤西自儀封界起經考城縣芝麻莊王家道口流連集東至山東曹縣界止長三十二里徭夫五十名堡房十六座黃陵岡南岸西南睢州南岸東南考城縣陵岡堤決趨張秋二年塞之每歲加工修守黃陵岡賈魯舊岸芝麻莊陳隆口南岸考城縣二處掃壩相連掃刷甚急每歲慎加防守李秀口南岸寧陵縣考城縣位家灣南岸歸德府商丘縣大王廟武家壩曹縣西隆慶六年築壩係迎溜去處最關緊要萬一有失則金鄉等邑悉成沮洳且遺患於運河宜歲加修守萬歷十七年武家壩外忽成淤灘此亦一時之幸未可恃以為安也山東濟寧管河道轄兖州府管河同知兼總捕務駐劄曹縣曹縣南岸西南商丘縣南岸東南虞城縣牛市屯王家厰劉滿莊月堤王家壩雙堤牛頭河曹縣知縣管河主簿北岸上自河南考城縣起經青俸集縷水堤月堤遙堤等下至單縣界止長一百零二里夫役曹縣三百六十四曹州一百二十六定陶八十金鄉二百八十四城武二百三十二徭堡夫六百七十六名曹州民夫三百五十曹縣民夫六百單縣三百金鄉三百城武三百二十定陶二百三十民夫候農隙量起不給工食王家壩正德七年築北大壩自位家灣起至雙堌集長八十里後接長三十里王家壩亦係緊要歲加修守萬一有失則城武金鄉數邑悉成沮洳曹縣西河南岸丁家道口賈魯舊河嘉靖二十六年河決曹縣衛谷亭運道曹單二縣大行堤康熙十年河決牛市屯遂築塞外口康熙三十年開引河一道水盡歸漕單縣南岸東夏邑縣南岸西永城縣堅城集假家口單縣知縣管河主簿北岸上自曹縣界起下至程朱王口朱家樓闕家莊孟家樓江南碭山界止長六十八里單縣金鄉城武徭堡夫七百七十九名江南碭山縣治在河南職官見南岸碭山縣北岸縷堤上自單縣界起下至豐縣界止長四千八百六十丈計二十七里碭山縷堤衝擊不支另築月堤一道又慮縷決月危且居豐沛上流碭山失守豐沛亦虞故復于單碭接界處斜築堤一道長千餘丈使上流循壩歸河不得迫縷危月最為喫緊歲修勿緩嘉靖二十二年河趨東北假家口分六股大溜溝小溜溝秦溝濁河煙脂溝飛雲橋俱由運河至徐州入洪又分一股由碭山堅城集下郭貫樓散五小股龍溝母河梁樓溝湖佃溝亦從小浮橋入洪已而皆入濁河清水河月堤𨽻豐縣每被浸刷萬歷十七年又添築月堤一道長二千五百丈每歲加修勿怠邵家壩萬歷六年所築遏斷秦溝舊路最為喫緊又接築數百丈今復幫築髙厚歲修之功必不容已江南豐縣南岸西南碭山縣南岸東南蕭縣華山戚山北岸縷堤上自碭山界起下至沛縣界止長四十八里內大行堤上自單縣界起下至沛縣界止長五十里豐縣知縣管河主簿額設逰夫五十名豐縣邵家大壩乃斷絶秦溝舊路最為喫緊今已倍幫髙厚又接長數百丈每歲宜謂徐北堤夫赴此加修加守若日後夫役錢糧有餘再於華山續築大壩直至樓子集將秦溝濁河二口俱斷則全勝之築也但壩須髙大斜向東南勿令兜水乃可經久姑識之以俟將來嘉靖六年河決曹縣城武縣楊家口梁靖口吳士舉等處沖入雞臺嘉靖九年河由單縣侯家林決塌場口沖谷亭十一年十二年水俱不至十三年廟道口淤塞嘉靖四十六年河決沛縣二三等鋪沖入運河亦由湖陵城口入湖城本年九月馬家橋堤成障水南趨至冬沛縣斷流沛縣南岸西南碭山縣南岸東南蕭縣飛雲橋郭貫樓支將軍廟舊茶城口塔山鎮口閘漕黃交會沛縣知縣管河主簿北岸大行堤上自豐縣界起下至本縣西門外頭堡止計三十三里縷堤上自豐縣華山界起下至徐州位家莊止長二十七里蕭縣北岸上自豐碭界起下至徐州界止長七十五里蕭縣知縣管河主簿額設徭夫一百名鎮口閘徐州上河管河判官管舊運黃河上自鎮口閘起下至徐州洪七里溝止長三十七里鎮口古洪二閘以東多傍山麓以西一里平曠濁河紅流更無隄防黃水出岸橫截閘河腹心受病故於塔山支河接築縷堤九百四十二丈而牛角灣係茶城運河舊渠又築壩一道東接塔山西接長堤計二里許以遏黃流旁入但壩地原係河身下多積沙創築卑薄連歲失守肘腋為患已於本壩之南自舊縷堤支將軍廟起東接塔山增築長堤七百餘丈頗得重門禦暴之意冬春之際多加幫護伏秋之時晝夜防守預辦樁草以備不虞夏鎮第一要害宜殫心力勿忽正德四年河決沛縣飛雲橋入運河嘉靖八年飛雲橋水北徙魚臺谷亭舟行閘面嘉靖四十四年黃水異常郭貫樓淤平全河溢行泛濫自沙河至徐州全河俱入北股至曹縣塘林集以下向北分二股南一股繞沛縣戚山楊家集入秦溝入徐北一股繞豐縣華山向東北由三教堂出飛雲橋分十三股至湖陵城口散漫湖坡達徐隆慶六年創築縷水長堤捍之水不北浸萬厯六年築邵家大壩遏之南徙迄今由濁河至鎮口會運河並流達徐隆慶六年所築縷堤萬厯八年大加幫築髙厚十八年又復加幫係運河關鍵以後須歲加修守萬歷十七年塔山東南築堤九百餘丈萬歷十八年塔山西北築堤七百餘丈徐州在河南職官見南岸黃河上自蕭縣起下至靈璧縣止長一百四十五里北岸縷堤自獅子山起至土山寺計十二里長山堤十五里花谷黑山三堤各長三里北岸長樊大壩險工一道關係運道全河直射每歲春初估計其事宜與城堤同城堤見南岸額設夫一百五十三名本州境內狼矢溝吳家堂韓壩等工亦係掃灣要害額設堤夫九十名徐州代沛縣出入將沛縣之夫扺徐州之夫故名換夫長夫三百六十名停役一半實在一百八十名宿州協濟夫十五名北岸小浮橋駱駝山東岸驛土山寺長山狼矢溝赤蘭村樊家店塔山塘臍溝吕梁城谷山栲橯灣郭山泇河花山龎家山七墩山蚧蟃湖上二山岠山磨臍溝減水壩徐州東岸南去十餘里有狼矢溝又東去十五里有磨臍溝每歲黃水漲發則從狼矢溝直下至磨臍溝泄出赤龍潭經蚧蟃諸湖駱馬湖出宿遷董陳二溝嘉靖年間全河俱從此出而兩洪正河俱為之奪萬歷七年已于本溝築遙堤一道但地形甚卑水入囊底隨復沖決遂議築減水石壩一座余郎中親往視之不可而止今此議尚存總河潘躬率中河沈郎中往視之地形較之河口卑數丈黃水暴漲之時必至逾堤漫流豈肯循軌入壩今議于長塔二山新築堤中建石壩一座長三十丈水漲則泄水退歸漕自無奪河之患矣但壩西與徐州居民甚不利此恐有盜決之患須特設一老人常用看守庶可久耳小浮橋故道今淤伏秋大漲僅出三分之一徐州洪石岩今已削平建回瀾亭于其上吕梁城中河分司東南靈璧縣北岸遙堤字號鋪徐州界起趙錢孫李周吳鄭王馮陳褚衛蔣睢寧界起沈韓楊朱秦尤許何吕施張曹嚴華邳州界江南鳯陽府靈璧縣西北吕梁城靈璧縣