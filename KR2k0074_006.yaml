州之二鎮以避水神宗熙寧十年河大決于澶州流段絶河道南徙東滙于梁山張澤濼分為二派一合南清河入于淮一合北清河入于海丘文莊曰此黃河入海之始徽宗大觀元年河決陷巨鹿縣冀州河溢壞信都南宫兩縣元成宗大德元年秋河決杞縣浦口塞之明年復決塞河之役無歲無之是後水北復入故道順帝至正四年五月大雨二十餘日黃河暴溢水深二丈北決白茅堤又北決金堤濱河郡縣濟寧虞城碭山魚臺金鄉豐沛定陶楚丘武城以至曹州等處皆罹水患止浸安山湖沿入會通運河濟南間將壞兩漕司鹽場至正十一年四月詔賈魯治之發汴梁大名府十三路民十萬人廬州等戍軍二萬人是月二十二日鳩工九月工成舟楫通行賈魯河記云翰林學士歐陽懸曰司馬遷班固記河渠溝洫僅載治水之道不言其方後世任斯事者無所考則今從賈魯訪問方略又詢過客質史牘作至正河防記使來世罹河患者按而求之可得其法治河一也有疏有塞有濬三者異焉釃河之流因而導之謂之疏去河之淤因而深之謂之濬抑河之暴因而扼之謂之塞疏濬之别有四曰生地曰故道曰河身曰減水河生地有直有紆因直而鑿之可就故道故道有髙有卑髙者平之以趨卑髙卑相就則髙不壅卑不豬不慮夫壅生潰豬生堙也河身者水雖通行身有廣狹狹難受水水溢悍故狹者以計闢之廣難為岸岸善崩故廣者以計禦之減水河者水放曠則以制其狂水隳突則以殺其怒治堤一也有創築修築補築之名有治水堤有截河堤有護岸堤有縷水堤有石船堤治掃一也有岸掃水掃有龍尾掃攔頭馬頭等掃其為掃臺及推捲牽制埋挂之法有用土用石用鐡用草用木用找周䋎之方塞河一也有缺口有豁口有龍口缺口者已成川豁口者舊常為水所豁水退則口下于堤水漲則溢出於口龍口者水之所會自新河入故道之處也此外不能悉書因其用功之次第而就述于其下焉其濬故道深廣不等通長二百八十里百五十四步而強功始自白茅長百八十里繼自黃陵岡至南白茅闢生地十里口初受廣百八十步深二丈有二尺以下停廣百步髙下不等相折深二丈及泉曰停曰折者用古算法因此推彼知其勢之低昂相凖折而取勻停也南白茅至劉莊村接入故道十里通折墾廣八十步深九尺劉莊至專固百有二里二百八十步通折停廣六十步深五尺專固至黃固墾生地八里面廣百步底廣九十步髙下相折深丈有五尺黃固至哈只口長五十一里八十步相折停廣墾十步深五尺又濬凹里減水河通長九十八里百五十四步凹里村缺河口生地長三里四十步面廣六十步底廣四十步深一丈四尺自凹里生地以下舊河身至張贊店長八十二里五十四步上三十六里墾廣二十步深五尺中三十五里墾廣二十八步深五尺下十里二百四十步墾廣二十六步深五尺張贊店至楊青村接入故道墾生地十有三里六十步面廣六十步底廣四十步深一丈四尺其塞專固缺口修堤三重並補築凹里減水河南岸豁口通長二十里三百十有七步其創築河口前第一重西堤南北長三百三十步面廣二十五步底廣三十三步樹置樁橛實以土牛草葦雜稍相兼高丈有三尺堤前置龍尾大掃言龍尾者伐大樹連稍繫之堤旁隨水上下以破囓岸浪者也築第二重正堤並補兩端舊堤通長十有一里三百步缺口正堤長四里兩岸相接舊堤置樁堵閉河身長百四十五步用土牛葦草稍土相兼修築底廣三十步修高二丈其岸上土工修築者長三里二百一十五步有竒髙廣不等通髙一丈五尺補築舊堤者長七里三十步表裏培薄七步增卑六尺計髙一丈築第三重東後堤并修接舊堤髙廣不等通長八里補築凹里減水河南岸豁口四處置樁木草土相兼長四十七步于是堤塞黃陵全河水沖及岸上修堤長六十六里百三十八步其修大堤制水者二長十有四里七十步其西復作大堤制水者一長十有二里百三十步內創築岸上土堤西北起李八宅西堤東南至舊河岸長十里百五十步顛廣四步趾廣三丈髙丈有五尺仍築舊河岸至入水堤長四百三十步趾廣三十步顛殺其六之一修接入水兩岸掃堤並行作西掃者夏人水工徴自靈武作東掃者漢人水工徴自近畿其法以竹絡實以小石每掃不等以蒲葦綿腰索經寸許者縱鋪廣可一二十步長可二三十步又以曵掃索綯經三寸或四寸長二百餘尺者橫鋪之相間復以竹葦麻􅐨大索長三百尺者為管心索就繫綿腰索之端於其上以草數千束多至萬餘勻布厚鋪於綿腰索之上櫜而納之丁夫數千以足蹅實推捲稍髙則以水工二人立其上而衆人同聲力舉用大小推梯推捲成掃髙下長短不等大者髙二丈小者不下丈餘又用大索或呼為腰索轉致操管心索順掃臺立蹅或挂之臺中鐡貓大橛之上以漸縋之下水掃後掘地為渠陷管心索于渠中以散草厚覆築之以土其上復以土牛雜草小掃稍土多寡厚薄先後隨宜修築掃臺務使索制上下縝密堅壯互為犄角掃不動搖日力不足夜以繼之積纍既畢復施前法捲掃以壓先下之掃量水淺深制掃厚薄壘之多至四掃而止兩掃之間置竹絡或三丈圍四五尺實以小石土牛既滿繫之竹纜其兩旁並掃密下大樁就以竹絡上大竹腰索繫于樁上東西兩掃及其中絡之上以草土等物築為掃臺約長五十步或百步再下掃即以竹索或麻索長八百尺或五百尺者一二雜厮其餘管心索之間候掃入水之後其餘管心索如前埋挂隨以管心長索置逺五七十步之外或鐡貓或大樁之上曵而係之通管束纍日所下之掃再以草土等物通修成堤又以龍尾大掃密挂于護堤大椿分析水勢其堤長二百七十步北廣四十二步中廣五十五步南廣四十二步自顛至趾通髙二丈八尺其截河大堤髙廣不等長十有九里百七十七步其黃陵北岸者長十里四十步築岸上土堤西北起于東北故堤東南至河口長七里九十七步顛廣六步趾倍之而強二步髙丈有五尺接修入水施土牛小掃稍草雜土多寡厚薄隨宜以修疊及下竹絡安大樁繫龍尾掃如前兩堤法唯修疊掃臺增用白闌小石并掃上及前遊修掃堤一長百餘步直抵龍口稍北攔頭三掃並行掃大堤廣與剌水二堤同通前列四掃間以竹絡成一大堤長二百八十步北廣百一十步其顛至水面髙丈有五尺水面至澤腹髙二丈五尺通髙三丈五尺中流廣八十步其顛至水面髙丈有五尺水面至澤腹髙五丈五尺通髙七丈并創築縷水橫堤一東起北截河大堤西扺西剌水大堤又一堤東起中剌水大堤西扺西剌水大堤通長二里四十二步亦顛廣四步趾三之髙丈有二尺修黃陵南岸長九里百六十步內創岸上堤東北起新補白茅故堤西南至舊河口髙廣不等長八里二百五十步乃入水作石船大堤蓋由是秋八月二十九日乙巳故道河流先所修北岸西中剌水及截河三堤猶短約水尚少力未足恃決河勢大南北廣四百餘步中流深三丈餘益以秋漲水多故河十之八兩河爭流近故河口水刷岸北行洄漩湍激難以下掃且掃行或遲恐水盡湧入決河因淤故河前功遂隳賈魯乃精思障水入故河之方以九月七日癸丑逆流棑大船二十七艘前後連以大桅或長樁用大麻索竹絙絞縳綴為方舟又用大麻索竹絙周船身繳繞上下令牢不可破乃以鐡貓於上流硾之水中又以竹絙絶長七八百尺者繫兩岸大橛上每絙或硾二舟或三舟使不得下船腹略鋪散草滿貯小石以合子板釘合之復以掃密布合子板上或二重或三重以大麻索合之急復縳橫木三道于頭桅皆以索維之用竹編笆夾以單石立之桅前約長丈餘名曰水簾桅復以木搘柱使簾不偃仆然後選水工便捷者各船各二人執斧鑿立船首尾岸上槌鼓為號鼓鳴一時齊鑿須臾船冗水入並沉遏河水怒溢故河水暴增即重更水簾令後復布小掃土牛白闌長稍雜以草土以物隨冝填垜以繼之石船下詣實地出水基趾漸髙復捲大掃以壓之前船勢略定尋用前法沉餘船以竟後工昏曉百刻役夫畨休甚勞無少間斷船堤之後草掃三道并舉中置竹絡盛石并掃置樁繫纜四掃及絡一如修北截水堤之法第一中流水深數丈用物之多施工之大數倍他堤船堤距北岸才三四十步勢迫束河流峻若自天降深淺叵測于是先卷下大掃約髙二丈者四五始出水面修至河中一二十步用工尤艱薄龍門喧豗猛疾勢撼掃基陷裂欹傾俄逺故所觀者變色衆議騰沸以為難合然勢不得已魯神色不動機解捷出進官吏工徒十餘萬人日加奬諭辭旨懇切衆皆感激赴工十一月十一日龍口遂合決口絶流故道復通又於堤前通捲攔頭掃各一道多者或三或四前掃出水管心大索繫前掃硾後攔頭掃之後後掃管心大索亦繫小掃前攔頭掃之前後先羈縻以錮其勢又於所交索上及兩掃之間壓以小石白闌土牛草土相半厚薄多寡相勢措置掃堤之後自南岸後修一堤抵已閉之龍口長二百七十步船堤四道成堤用農家場園之具曰轆軸者穴石立木如比櫛埋前掃之旁每步置一轆軸以橫木貫其後又穴石以經二寸餘麻索貫之繫橫木上密挂龍尾大掃使夏秋潦水冬春凌不得肆力于岸此堤抵北岸截河大堤長二百七十步南廣百二十步顛至水面髙丈有七尺水面至澤腹髙四丈二尺中流廣八十步顛至水面髙丈有五尺水面至澤腹髙五丈五尺通髙七丈仍治南岸護堤掃一道通長百三十步南岸護岸馬頭掃三道通長九十五步修築北岸堤防髙廣不等通長二百五十四里七十一步白茅河口至板城補築舊堤長二十五里二百八十五步曹州板城至英賢村等處髙廣不等長一百三十三里二百步稍岡至碭山縣增培舊堤長八十五里二十步歸德府哈只口至徐州路三百餘里修完缺口一百七處髙廣不等積修計三里三百五十六步亦思剌店縷水月堤髙廣不等長六里三十步其用物之繁樁木大者二萬七千榆栁雜稍六十六萬六千帶稍連根株者三千六百藁枯葦蒲雜草以束計者七百七十三萬五千有竒竹竿六十二萬五千葦席十有七萬二千小石二十艘繩索大小不等五萬七千所沉大船百有二十鐡纜三十有二鐡貓三百三十有四竹篦以斤計者十有五萬硾石三千塊鐡鑽萬四千二百有竒大釘三萬三千二百三十有二其餘若木龍蠶椂木麥秸抶樁鐡又鐡吊枝麻搭火鈎汲水貯水等具皆有成數官吏俸給軍民衣糧工錢醫藥祭祀賑恤驛置馬乘及運竹木沉船渡船下樁等工鐡石竹木繩索等匠傭資兼以和買民地為河併應用雜物等價通計中統鈔百八十四萬五千六百三十六錠有竒魯嘗有言水工之功視土工之功為難中流之功視河濱之功為難決河口視中流又難北岸之功視南岸為難用物之效草雖至柔柔能押水水積之生泥泥與草並方重如錠然維持夾輔纜索之功實多是役也君相知魯習知河事推心委任魯能竭其心思智計之巧乘其精神膽氣之壯不惜劬勞不畏􅏺評以報君相知人之明故悉書之使後人有所考證也此見魯治河亦是修復故道黃河自此不復北徙功不可泯至嘉靖三十九年河從上源潰決此河遂淤二十六年春黃河北徙自東明曹濮下及濟寧民皆被害明太祖洪武元年河決曹州從雙河口入魚臺大將軍徐達開塌場口入于泗以通運時運河未開二十年河決開封城自安逺門入淹沒官民廨宇甚多二十四年河決原武經開封城北五里又南行至項城經潁州潁上東至夀州正陽鎮全入于淮而故道遂淤三十年河溢開封南徙入陳州永樂九年河決工部主史藺芳言緣河築岸掃座止用蒲繩泥草故不能堅久用木編成大囤實以小石橫木貫之入水築堤可固從之河塞擢芳工部侍郎洪治六年河決黃陵岡命都御史劉大夏治之大夏遂自張秋決口視潰決之源以西至河南廣武山洊涸之歸以北至臨清衛河地勢事宜既悉然以時當夏半水勢方盛又漕舟鱗壅口南因相與議曰治河之道通漕為急乃于決口西岸鑿月河三里許屬之舊河以通漕舟舟既通又議黃陵岡在張秋之上而荆隆等口又黃陵岡潰決之源築塞固有緩急然治水之法不可不先以殺其勢遂鑿滎陽孫家渡口河道七十餘里濬祥符四府營淤河二十餘里以達淮濬賈魯舊河四十餘里由曹縣糧進口出徐州運河支流既分水勢漸殺而於是乃謂築塞諸口其自黃陵岡已上凡地屬河南者悉用河南兵民夫匠即以其方面官分統臣大夏往來總督之博采羣議晝夜計思殆忘寢食故官屬夫匠悉用命築臺捲掃齊心畢力遂獲成功初河南諸口之塞惟黃陵岡屢合屢決為最難既塞之後特築堤三道以護之髙各七丈厚半之又築長堤荆隆口東西各二百餘里黃陵岡東西各三百餘里直抵徐州俾河恆南行故道而下流張秋可無潰決之患矣是役也用夫匠五萬八千名有竒柴草一千二百萬束有竒竹木大小一萬二百根有竒鐡生熟一萬九百斤有竒麻三十二萬斤有竒其興功以𢎞治甲寅十月次年二月而畢正德四年九月河決曹縣揚家口奔流曹單二縣達古迹王子口直抵徐沛舟楫通行遂成大河五年二月起工修治至五月中雨漲掃臺衝蕩不克完合八年七月河決曹縣以西娘娘廟口孫家口二處從曹縣城北東行而曹單居民被害益甚是年驟雨漲娘娘廟口以北五里焦家口衝決曹縣以北城武以南居民田廬盡被漂沒嘉靖六年河決曹單城武楊家口梁靖口吳士舉莊衝雞鳴臺七年河決淤廟道口三十餘里河道都御史盛應期奏開趙皮寨白河一帶分殺水勢八年飛雲橋之水北徙魚臺谷亭舟行閘面九年河決塌場口衝谷亭水經三年不去十三年又淤廟道口都御史劉天和役夫一十四萬濬之是年河決趙皮寨入淮本年忽自河南夏邑縣大丘回村等集衝數口轉向東北流經蕭縣出徐州小浮橋下濟二洪趙皮寨等亦塞十九年河決野雞岡由渦河經亳州入淮二洪大涸兵部侍郎王以旗開李景髙支河一道引水入徐濟洪役丁夫七萬有竒八日而成尋淤二十六年決曹縣沖谷亭運河下淤三十二年決房村約淤三十里都御史曽鈞役丁夫五萬六千有竒濬之三十七年新集淤七月忽向東北沖成大河而新集河由曹縣循夏邑丁家道口司家道口出蕭縣薊門由小浮橋入洪七月淤凡二百五十餘里趨東北假家口析為六股曰大溜溝小溜溝秦溝濁河煙脂溝飛雲橋俱由運河至徐洪又分一股由碭山堅城集下郭貫樓又析五小股為龍溝母河梁樓溝楊氏溝胡店溝亦由小浮橋會徐洪河分為十一派遂淤然分多則勢弱勢弱則并淤之機也四十四年七月河果大淤全河南繞沛縣戚山入秦溝北繞豐縣華山漫入秦溝接大小溜溝泛濫入運河至胡陵城口漫散湖坡從沙河至二洪八月工部尚書朱衡乃請開都御史盛應期原議新河自南陽至留城僉都御史潘季訓請接濬留城舊河併力挑濬八閲月而成隆慶四年七月黃河決睢寧縣曲頭集王家口馬家淺等處運道沙墊一百餘里俱為平陸淤重儲船九百餘隻河臣潘季馴築塞諸決河水仍歸正道儲船乃出隆慶以來髙家堰大潰淮水東趨決黃浦八淺而興鹽髙寶諸邑匯為巨浸淮城水困民不聊生黃河亦決崔鎮等處而桃清河塞運道梗阻者數年萬歷六年命潘季馴總督河漕築髙家堰六十餘里歸仁集堤四十餘里栁浦灣堤東三十餘里西四十餘里塞崔鎮等決一百三十餘處徐睢邳宿桃清兩岸築遙堤共長五萬六千四百三十餘丈馬厰城堤七百四十餘丈防河外決築碭山大壩豐縣邵家大壩各一道約水不得北徙築徐沛豐碭縷堤一百四十餘里砌八淺寶應湖石堤共長一千五百七十餘丈建崔鎮徐升等四減水壩修復淮安新舊閘遷通濟閘於淮安甘羅城南河患遂息萬歷三十一年河決歸德命都御史曽挑濬開新河而初開之處深廣地勢迤邐而南反淺而狹議者私憂之下流反淺何以能行况所決河廣八十餘丈而新開僅三十丈勢必不能容泛溢之患在所不免而一董役者奏記督府若河流既回勢若雷電藉其自然之勢以衝之何患淺者之不深乎督府大以為然遂下令放水不知黃河濁下皆淤沙流勢稍緩下已淤過半矣一方水漲魚臺單縣豐沛之門皆罹水患天啓四年河決魁山堤潰徐州城平地水深丈餘崇禎十六年逆賊李自成決河水灌汴城明宗室士民皆被淹沒時大亂未治本朝治河黃河南北情形必目擊足遍廣訊博訪如行路者歷一步知一步之艱非揣摩臆度者可幾也蓋常熟察水之情與天之時地之利大扺中州之河趨下桃清之河趨上下者冝掃上者可隄南岸之勢昻北岸之勢低昻者猶可修于事後低者必先防于未然夏秋水漲走灘冬春水落趨灣其灣也可以隄塞其灘也可以挑引皆所以順水之性也茍拂其性雖有聖智寧能與水角力哉順治七年封丘縣馬神大王廟決工難塞塞後復潰此近歲第一河患也河勢趨射東北大王廟一帶正當頂沖當時非不極力堵塞以決口迤南無下流分㵼之路隨塞隨決遲至乙未年從口迤南相度頂沖灣刷之處開引河河勢漸次分行決口兩壩捲掃不至仍前沖淌由是引河日漸湥濶決口合尖報竣矣順治十四年陳留縣南岸孟家埠口從上源圈河沖刷西岸坍塌此為掃灣河勢監司誤議掃工辦料搶下護堤糜費無功則河功之成敗貴于虛懷博訪耳若河勢果係頂沖方議下掃所下之掃正迎其溜雖水汛日猛而掃個安然無恙若河係掃灣掃不迎河則掃隨水淌計一晝夜坍塌立盡掃灣河患頭堤難固須內議月堤如在內地勢髙亢須加風掃以護新堤使免坍刷倘在內地勢低窪月堤亦難折擋須從月堤護緣邉掃六七尺不等遮迅湧河勢不得肆其沖潰矣此掃灣河勢與頂沖不同而治之得法則成失法則敗者也順治十四年儀封三家莊東河患河勢變遷自南北沖直射堤根治之之法照堤加幫髙厚外隨加護掃層層又從上源受沖處挑引河一千餘丈所以北堤得固此三事並舉之工順治十八年儀封縣北岸三家莊西河患從上源大掃灣處挑引河從來河夏月走灘冬月走灣三冬從掃壩流刷引河直奪大河十分之七又于中流築截河大掃全河歸引北河今為平陸康熙元年曹縣北岸石香爐河患本年五月河水大漲掃灣沖決旋塞旋開至十一月始得掃築完固次年北築重堤護掃南挑引河河患乃息從來掃灣河勢潰決緊溜奔刷築之功難於驟施須待時而興工若輕舉鮮有不壞者爾時方五月彼中紳士百姓力爭搶築待決口合尖之時外門壅漲內堤處處傾危果從新壩潰決數十丈衆方信前言停工然物料蕩費已盡直至冬月晝夜搶築始克完功康熙十一年祥符縣南岸黑堽河患開引河分行兩載大堤保全十二年南岸掃頭集河勢從西北直射東南岸近大堤集人夫搶築月堤又下護堤邉掃又挑引河得保無虞康熙十一年陽武縣北岸潭口寺河勢上堤潭口寺一帶直當其沖河勢猛刷堤根下掃隨蟄隨套又隨套隨蟄原估掃個三層加至六七層才得出水堤身始免坍塌至十二年河勢東徙張家莊王家莊薑家莊一帶沖激靡定處處防危需掃不資幸河道崔某先于上源挑引河一道長二千五百餘丈至六月河水滔漲西南烈風颷起引河始得分流北堤上下沖激少平幸保無虞但十三年歲修北岸猶不可已而南岸引河頭南沙北徙猶須相機開導康熙十二年考城縣芝麻莊河患其北堤距南五六里有大掃灣形勢可挑引河儀封縣北岸蔡家樓考城縣南岸石家樓當挑引河亦與芝麻莊同康熙十二年徐州南岸賈家樓上源新挑引河桃源縣北岸九里堽河流自西東流其性也今崔鎮西九里堽河勢一變自南而北又變自北而南倒行逆流決裂已極且堤內地勢低下外河髙數尺建瓴危險殊切驚心治法上流曲折之處可以挑濬施工深廣如法待時開導此河成可保無虞且東南崔鎮一帶亦免衝射之患矣桃源縣南岸龍窩大河直走南岸勢難遷徙且下流七里溝黃家嘴新莊一帶北堤河患皆此倒灣河勢為厲之階總因河勢北徙離堤逼近而又河岸卑窪孤堤易傷今欲保北堤須改河勢欲改河勢惟相度上源曲折沖刷之處因勢利導以挽狂瀾不然河勢一日不變則北岸一帶歲歲隄防並無息肩之期矣兩河清彚卷六
